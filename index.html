{"n":57,"t":"第57章：仇人相见","c":"银火学派，议事大厅。\n\n天色渐暗，夕阳的余晖透过高大的窗户洒进大厅，在地面上投下斑驳的光影。然而此刻，大厅内的气氛却如寒冬般冰冷。\n\n莫雷导师端坐在主位之上，那张饱经风霜的脸上此刻写满了阴沉。在他的下方，还坐着几位学派的长老，他们的神情同样凝重。而在大厅中央，则站着一群身着夜语家族服饰的侍卫，为首的正是罗恩·夜语。\n\n“莫雷大师，”罗恩不卑不亢地道，声音中带着几分傲然，“我们这次来，是想带回我们家族的叛徒。”\n\n“叛徒？”莫雷导师冷笑一声，那笑声中满是不屑，“我银火学派可没有你们夜语家族的叛徒。你说的叛徒，是谁？”\n\n“莫雷大师，明人不说暗话。”罗恩上前一步，目光直视莫雷导师，“林恩·夜语是家族的叛逆，偷走了家族的秘宝后逃到了银火城。我们这次来，就是要把他带回去，接受家族的审判。”\n\n“林恩是我的弟子。”莫雷导师淡淡地道，但语气中却透着一股不容置疑的威严，“他的事情，我管定了。谁敢动他，就是与我为敌，与整个银火学派为敌。”\n\n罗恩脸色一沉：“莫雷大师，这是我们夜语家族的家事，您确定要插手？您应该知道，夜语家族在银月公国的地位可不是一个小小的银火学派能比拟的。”\n\n“我不是要插手，而是要保护我的弟子。”莫雷导师站起身，强大的气息瞬间爆发，整个大厅的温度仿佛骤降，“林恩既然加入了银火学派，就是学派的人。任何想要伤害学派成员的行为，都是在学派的挑衅。我银火学派建派数百年，还从来没有怕过任何人！”\n\n双方的气氛变得剑拔弩张，大战一触即发。\n\n就在这时，一位白发长老站出来打圆场：“罗恩贤侄息怒，有话好好说。林恩既然是莫雷导师的弟子，那自然也是我们银火学派的人。这其中是不是有什么误会？不如说出来，大家一起商量解决办法。”\n\n“误会？”罗恩冷笑一声，从怀中取出一块精致的令牌，令牌上刻着一个繁复的家族徽记，“长老请看，这是我家族的追缉令，上面有家主的印鉴。林恩偷走家族至宝'月影之泪'，叛逃出逃，这是事实。我们有确凿的证据，不是三言两语就能撇清的。”\n\n长老们传阅了追缉令，都是面面相觑。这种家族追缉令非同小可，没有确凿的证据，家主绝不会轻易签发。\n\n“莫雷导师，”一位黑袍长老看向莫雷导师，面露难色，“这追缉令看起来不假，你看这该如何处理？”\n\n莫雷导师沉思片刻，道：“就算林恩真的是你们家族的叛逆，那也是以前的事情。现在他是银火学派的弟子，受学派的保护。我不能眼睁睁看着他被你们带走。这件事没有商量余地。”\n\n“这么说，莫雷大师是要与我们夜语家族为敌了？”罗恩威胁道，眼中闪过一丝寒芒，“夜语家族的势力遍布银月公国，得罪了我们，可没有好下场。”\n\n“为敌又怎样？”莫雷导师身上气息再涨，强大的威压让罗恩不由自主地后退了一步，“别以为你们夜语家族了不起，这里是银火城，不是你们能撒野的地方！想要带走我的弟子，先过了我这一关！”\n\n罗恩变色后退。他虽然狂妄，但也知道自己不是莫雷导师的对手。这位莫雷导师据说已经达到了八级血脉战士的境界，放在整个银月公国也是顶尖强者。\n\n“好，很好。”罗恩深吸一口气，强行压下心中的怒火，“莫雷大师，今日之事我会如实禀报家族。山水有相逢，我们后会有期！”\n\n说完，罗恩一挥手，带着护卫转身离开。临走前，他回头看了一眼大厅深处，眼中闪过一丝阴狠。\n\n“我们走！”\n\n看着他们离开的背影，莫雷导师的脸色变得极为难看。\n\n“莫雷，”一位长老担忧地道，“这样做好吗？夜语家族可是银月公国的大贵族，得罪了他们……学派以后的日子只怕不好过啊。”\n\n“怕什么？”莫雷导师道，语气中带着几分傲然，“我们银火学派立足银火城这么多年，什么风浪没有见过？如果今天我退缩了，以后还怎么在徒弟们面前抬起头？”\n\n话虽如此，但莫雷导师心中也明白，夜语家族势力庞大，这次事件绝不会善罢甘休。\n\n“去把林恩叫来。”莫雷导师对身旁的学徒道，“就说我有重要的事情要问他。”\n\n“是！”\n\n不一会儿，林恩来到了议事大厅。\n\n“导师。”林恩恭敬地道，但他的目光中带着一丝不安。他已经听说了罗恩带人来的事情。\n\n“刚才的事情你知道了吗？”莫雷导师问道。\n\n“听说了。”林恩道，“罗恩带人来学派要人……”\n\n“你有什么打算？”莫雷导师直视着林恩的眼睛，“是准备投降，还是准备战斗？”\n\n林恩沉默片刻，道：“我不想连累学派。如果他们真的不肯放过我，我就……”\n\n“就什么？”莫雷导师打断他，“就出去送死？你这个笨蛋！”\n\n林恩低下了头。\n\n“你知道罗恩带了多少人吗？”莫雷导师恨铁不成钢地道，“六级血脉战士就有三个，七级强者也有一个！就凭你现在的实力，出去就是找死！”\n\n“弟子知错。”林恩道。\n\n莫雷导师叹了口气，语气缓和下来：“林恩，我知道你有傲气，但也要分清楚形势。现在还不是与夜语家族正面冲突的时候，你需要时间成长。只要你成长起来，莫说是夜语家族，就算整个银月公国，也无人敢小看你。”\n\n“弟子明白。”林恩握紧拳头，眼中闪过一丝坚定。\n\n“明白就好。”莫雷导师道，“我已经让人加强了对你的保护。在这银火城内，夜语家族还不敢乱来。但你也要小心，出了学派就不好说了。明白吗？”\n\n“是，弟子明白。”林恩道。\n\n与此同时，罗恩等人离开了银火学派。\n\n“少主，”一个贴身护卫低声问道，“现在怎么办？莫雷那个老家伙明显要护着林恩，我们总不能硬闯吧？”\n\n“硬闯？”罗恩冷笑一声，“你以为我刚才真的想动手？莫雷的实力深不可测，真打起来，我们这些人加起来都不是他的对手。”\n\n“那您的意思是……”\n\n“软的不行，那就来硬的。”罗恩眼中闪过一丝阴狠，“既然他不肯交人，那我们就让林恩自己走出来。我就不信，他能一辈子躲在学派里不出来。”\n\n“您的意思是……”\n\n“准备一下，今晚动手。”罗恩道，“记住，不要在学派内部动手，动静太大了。想办法把他引出来，在城外解决他。到时候死无对证，莫雷就算想追究也找不到证据。”\n\n“是！少主英明！”护卫恭维道。\n\n当天晚上，月明星稀。\n\n林恩正在宿舍中修炼，体内的血脉之力缓缓流转。突然，他的通讯水晶亮了起来。\n\n“林恩，不好了！”黛西急切的声音从通讯水晶中传出，“罗恩带人堵在学派门口，说要跟你决战！你千万不要出去！”\n\n林恩眼神一凛：“决战？”\n\n“我已经让戈克去通知泰勒和卡尔了。”黛西道，“你先不要冲动，他们明显是有备而来。”\n\n“我知道了。”林恩道，“谢谢你，黛西。”\n\n“谢什么，我们是好朋友嘛。”黛西道，“你一定要小心啊！”\n\n通讯结束，林恩站起身，走出宿舍。\n\n此时，学派门口已经聚集了很多人。罗恩带着十几个护卫，站在大门外，气势汹汹。在月光下，他们的身影显得格外高大。\n\n“林恩，你终于敢出来了。”罗恩冷笑道，目光中满是轻蔑，“我还以为你会一直躲下去呢。”\n\n“你想怎么样？”林恩淡淡地道，脸上看不出任何情绪波动。\n\n“怎么样？当然是解决我们之间的恩怨。”罗恩道，“你偷走家族的秘宝，这笔账也该清算清算了。敢不敢跟我打一场？”\n\n“打一场？”林恩道，“怎么打？”\n\n“很简单。”罗恩道，“我们出城一战，生死各安天命。你敢吗？”\n\n林恩还没有回答，泰勒、卡尔、戈克、黛西都赶了过来。\n\n“林恩，不要答应他！”泰勒急道，“这是陷阱！明眼人都能看出来！”\n\n“我知道。”林恩道，“但如果不答应，他们会一直纠缠下去。这样下去，学派也会被我们连累。”\n\n“可你的实力……”卡尔也劝道，“你才四级中期，根本不是他的对手。这一战，风险太大了。”\n\n“正因为知道不是对手，才要打。”林恩道，语气坚定，“只有让他们看到我的实力，他们才会忌惮。而且，如果我退缩了，以后还怎么在银火城立足？怎么面对夜语家族的追击？”\n\n说完，林恩上前一步。\n\n“好，我答应你。”\n\n“林恩！”黛西想要阻止，但被林恩的眼神制止了。\n\n罗恩笑了，笑得十分得意：“很好，有胆量。我欣赏你的勇气，不过可惜，你站错了队。走吧，去城外。”\n\n一行人来到银火城外的一片空地上。\n\n此时是深夜，月光如水，洒在地面上，将整个空地照得如同白昼。\n\n罗恩和林恩相对而立，气氛紧张到了极点。\n\n“林恩，”罗恩冷笑道，“如果你现在投降，我可以考虑留你一个全尸。毕竟你也算是夜语家族的血脉，给你留个全尸，已经是我最大的仁慈了。”\n\n“废话少说。”林恩拔出长剑，剑身上流转着淡淡的银色光芒，“动手吧。”\n\n罗恩也不再废话，身上勐地爆发出一股强大的气息。\n\n六级血脉战士巅峰！\n\n这就是罗恩的真正实力！在他的身后，隐约有一道银色的狼影浮现，那是夜语家族的血脉象征——银月之狼！\n\n“好强大的气息！”泰勒变色道，“这就是六级血脉战士巅峰的实力吗？果然不是五级能比的！”\n\n“担心也没有用了。”卡尔按住泰勒的肩膀，“相信林恩，他不是冲动的人。”\n\n六级血脉战士的气息如同一座大山般压向林恩，然而林恩却站的笔直，没有丝毫退缩。\n\n“喝！”\n\n林恩同样爆发出气息，虽然只有四级中期，但气势竟然不弱于六级血脉战士！\n\n“什么？！”罗恩脸色微变，“这不可能！四级中期怎么会有这么强的气息？！”\n\n“这有什么不可能的？”林恩冷笑一声，“你做不到的事情，不代表别人做不到。”\n\n“这一定是假的！”罗恩难以置信地道，“一定是用了什么秘法！没关系，不管你用什么方法提升实力，今天都别想活着离开！”\n\n林恩没有解释身形一闪，朝罗恩冲了过去。他的速度极快，眨眼间就跨越了数十米的距离。\n\n“找死！”\n\n罗恩冷笑一声，同样冲了上来。\n\n两人的战斗瞬间爆发！\n\n“轰！”\n\n一声巨响，两人的剑芒在空中相撞，爆发出一阵刺眼的光芒。强大的气流将周围的尘土卷起，形成了一个小小的漩涡。\n\n“好强！”观战的护卫们纷纷变色，“这就是少主的真正实力吗？”\n\n“不止！”一个护卫指着林恩，难以置信地道，“那个林恩……他竟然挡住了少主的攻击！”\n\n没错，硬拼了一击之后，林恩竟然没有落败！\n\n罗恩的脸色变得极为难看。他本以为这一击就能解决林恩，没想到对方竟然接住了。\n\n“有点意思。”罗恩阴沉着脸道，“看来我还是小看你了。”\n\n“你小看我的事情，还多着呢。”林恩淡淡地道。\n\n战斗继续升级。两人都是年轻一代的佼佼者，打起来自然是精彩纷呈。剑芒四射，气劲纵横，整个空地都被他们的战斗余波笼罩。\n\n然而，随着战斗的进行，林恩的实力开始显现出来。虽然他只有四级中期，但他的战斗力竟然不弱于六级！\n\n“这不可能！”罗恩心中怒吼，“为什么？为什么一个四级中期的废物能够跟我打成平手？！”\n\n他哪里知道，林恩体内的血脉之力特殊，再加上莫雷导师的悉心教导，早就让他拥有了越级战斗的能力。\n\n更重要的是，林恩的心中燃烧着怒火。这份怒火，是夜语家族给予他的！\n\n“夜语家族……”林恩喃喃道，眼中闪过一丝寒芒，“你们欠我的，我会一点一点讨回来！”\n\n就在林恩准备离开议事大厅时，门外突然传来一阵喧哗声……\n\n（本章完）"},
{"n":58,"t":"第58章：学派的立场（一）","c":"银火学派，议事大厅外的广场。\n\n夕阳西下，金色的余晖洒落在古老的石板地面上，将银火学派的标志性建筑——那座高耸入云的银焰塔——染成了灿烂的金色。这座传承了数百年的魔法学院，在落日的余晖中显得格外庄严而神秘。\n\n然而，此时此刻，学派门口的气氛却是剑拔弩张。\n\n罗恩·夜语带着十余名护卫，浩浩荡荡地堵在学派大门前。他今日身穿一袭黑色劲装，胸口绣着夜语家族的族徽——一把被月光包裹的黑色利剑，在火光的映照下显得格外刺眼。他的脸上带着冷笑，那笑容中满是傲慢与不屑。\n\n“林恩·夜语！”罗恩的声音如同冰刀般刺耳，在黄昏的广场上回荡，“给我滚出来！你这个家族的叛徒，偷走秘宝的贼！敢做不敢当吗？！”\n\n他的声音很大，故意让周围的所有人都能听到。\n\n学派的学徒们纷纷驻足观望，窃窃私语。\n\n“那就是夜语家族的人？好大的阵仗！”\n\n“为首的那个好像是夜语家族的嫡子罗恩，据说已经是六级血脉战士巅峰了！”\n\n“林恩学长呢？他在里面吗？”\n\n“罗恩学长这是在挑衅啊，竟然堵到学派门口来了！这也太嚣张了吧？”\n\n“嘘，小声点，夜语家族我们可惹不起……”\n\n学徒们议论纷纷，眼中闪烁着兴奋的光芒。在这种和平年代，很少有机会看到年轻一代的强者对决。对他们来说，这可是一场难得一见的精彩战斗。\n\n罗恩见林恩不出来，冷笑一声，继续挑衅：“怎么？只敢躲在学派里当缩头乌龟吗？林恩·夜语，你不是很有骨气吗？不是说要脱离家族吗？现在怎么跟个废物一样躲起来了？”\n\n他的话语极其刺耳，每一字每一句都充满了嘲讽和轻蔑。\n\n“你如果还是男人的话，就给滚出来！我们之间的恩怨，就在学派门口了断！今天，不是你死，就是我亡！”\n\n此言一出，整个广场都沸腾了。\n\n“了断？他说要在学派门口了断？”\n\n“这也太嚣张了吧？当我们银火学派是什么地方？”\n\n“就是，这里可是银火城，不是他夜语家族的地盘！”\n\n“学派的导师们呢？就这么看着他们欺负人？”\n\n学徒们群情激奋，但没有人敢真正站出来。夜语家族的势力太大了，没有人愿意得罪这样一个庞然大物。\n\n与此同时，学派内部，议事大厅。\n\n莫雷导师正坐在主位上，听着下方长老的汇报。他的脸色阴沉得可怕，手指轻轻敲击着扶手，显示着内心的不平静。\n\n“导师，”一位白发长老道，“罗恩·夜语带着人堵在门口，要求见林恩。这已经是第二次了。上次他们来的时候，您已经警告过他们了。”\n\n“我知道。”莫雷导师淡淡地道，“他们想怎么样？”\n\n“他们在门口大吵大闹，说林恩是家族的叛逆，偷走了秘宝。现在还说要……要在学派门口了断恩怨。”\n\n“了断？”莫雷导师冷笑一声，“好一个了断！真当我银火学派无人了吗？”\n\n他勐地站起身，就要往外走。\n\n“导师，”另一位黑袍长老道，“您要亲自出面？这会不会……夜语家族毕竟势大，我们……”\n\n“怎么？”莫雷导师回头看了他一眼，“你觉得我应该退缩？”\n\n“不，导师，我不是这个意思。”黑袍长老连忙道，“只是夜语家族在银月公国势力庞大，我们学派虽然不惧他们，但也没必要与他们正面冲突。”\n\n“不冲突？”莫雷导师冷笑道，“人家都堵到我们家门口来了！你让我怎么忍？！”\n\n他，大步朝外走去。\n\n“导师……”\n\n“告诉所有学徒，”莫雷导师头也不回地道，“我银火学派从来不是怕事的主。谁敢欺负我们的弟子，就是与我们整个学派为敌！”\n\n广场上，罗恩的挑衅还在继续。\n\n“林恩！你这个缩头乌龟！还号称是什么夜语家族的天才！我看就是个废物！有本事出来跟我单挑！”\n\n“你不是很牛吗？不是说要脱离家族吗？怎么现在连面都不敢露？”\n\n“滚出来！滚出来！滚出来！”\n\n护卫们也跟着起哄，声音一浪高过一浪。\n\n就在这时，一阵脚步声从学派内部传来。\n\n“蹬蹬蹬——”\n\n沉重而稳定的步伐声，仿佛每一步都踏在人的心跳上。\n\n一道身影缓缓走出。\n\n林恩穿着一袭灰色长袍，背负长剑，面容冷峻。他的深邃的眼眸中看不出任何情绪波动，仿佛一潭平静的湖水。但若是仔细看，就会发现那平静的表面下，隐藏着即将爆发的火山。\n\n他的身后，还跟着泰勒、黛西、卡尔和戈克。\n\n“林恩！”黛西担忧地抓住林恩的手臂，“不要冲动……”\n\n“放心。”林恩淡淡地道，“我有分寸。”\n\n他早就料到夜语家族不会善罢甘休，只是没想到他们会如此明目张胆地堵到学派门口来。这不仅仅是对他的挑衅，更是对整个银火学派的挑衅！\n\n“罗恩。”林恩上前一步，目光冰冷，仿佛两把利剑直射罗恩，“你究竟想怎么样？”\n\n罗恩见到林恩，眼中闪过一丝喜色，但很快就掩饰过去，随即冷笑道：“想怎么样？当然是解决我们之间的恩怨。你偷走家族秘宝'月影之泪'，叛逃出家族，这笔账该清算清算了。”\n\n“月影之泪本来就是我的东西。”林恩淡淡地道，语气中没有一丝波动，“是你们夜语家族强行夺走的，现在我只是拿回属于自己的东西而已。”\n\n“笑话！”罗恩怒道，“家族的秘宝，只有家族血脉才能使用。你一个被驱逐的私生子，有什么资格使用家族的秘宝？”\n\n“资格？”林恩冷笑一声，笑容中带着几分寒意，“那就用实力来说话吧。”\n\n罗恩等的就是这句话。\n\n“好！既然你找死，我就成全你！”罗恩上前一步，挑衅地道，“敢不敢跟我出城一战？生死各安天命！”\n\n此言一出，周围的气氛瞬间变得紧张起来。\n\n出城一战，这意味着不死不休！\n\n在这个世界上，巫师和血脉战士的决斗是被允许的。一旦双方同意出城一战，任何人都不能干预，失败者只能怪自己技不如人。\n\n“林恩，不要答应！”泰勒急道，“这明显是陷阱！六级血脉战士巅峰的实力，不是你现在能够对抗的！”\n\n“对啊，”卡尔也道，“而且罗恩身边还有那么多护卫，就算你赢了，他们也不会让你活着离开的！”\n\n“林恩，”黛西眼眶微红，抓住林恩的手臂，“不要去……他们会杀了你的……”\n\n林恩看着身边的伙伴，心中涌起一股暖意。但他的眼神却异常坚定，没有丝毫动摇。\n\n“黛西，泰勒，卡尔，”林恩轻声道，声音不大，但却异常坚定，“你们的心意我领了。但是，如果我今天退缩了，夜语家族会更加嚣张。他们会认为我怕了，会认为银火学派怕了。”\n\n他顿了顿，又道：“而且，他们不会放过我的。与其一直躲躲藏藏，看他们的脸色行事，不如今天就做个了断。正好借此机会，向所有人证明——我林恩·夜语，不是任人揉捏的软柿子！”\n\n“林恩……”黛西泪眼婆娑，想要再说些什么，但看到林恩坚定的眼神，最终还是没有说出口。\n\n“可你的实力……”泰勒咬牙道，“四级中期 vs 六级巅峰，这差距也太大了！”\n\n“四级中期又怎么样？”林恩微微一笑，笑容中带着几分自信，“六级巅峰又怎么样？战斗不到最后一刻，谁也不知道结果。再说了，我林恩什么时候让你们失望过？”\n\n看着林恩坚定的眼神，众人知道无法劝阻。\n\n“小心。”泰勒最终只能说出这两个字。\n\n“等我回来。”林恩道，“相信我。”\n\n说完，他转身看向罗恩，淡淡地道：“好，我答应你。出城一战。”\n\n“林恩！”黛西泪流满面。\n\n林恩回头，给了她一个安心的眼神：“放心，我不会有事的。”\n\n罗恩大笑起来，笑声中充满了得意和不屑：“很好！林恩，我欣赏你的勇气。不过放心，我会给你留个全尸的，毕竟你也算是夜语家族的血统。哈哈哈！”\n\n“废话少说。”林恩拔出长剑，剑身上流转着淡淡的银色光芒，那是暗影血脉之力在流转，“走吧。”\n\n一行人离开学派，朝银火城外的荒野走去。\n\n夕阳的余晖将他们的身影拉得很长，仿佛是通往地狱的道路。\n\n泰勒、黛西、卡尔、戈克紧随其后，每个人的脸上都写满了担忧。\n\n“林恩真的没问题吗？”戈克担忧地道，“那可是六级巅峰啊！”\n\n“不知道。”泰勒摇头道，“但我相信他。”\n\n“如今也只能相信他了。”卡尔握紧拳头，“如果林恩出了什么事，我绝对不会放过夜语家族的人！”\n\n黛西没有说话，只是紧紧握着法杖，随时准备出手。\n\n银火城外，是一片荒芜的旷野。\n\n这里杂草丛生，怪石嶙峋，是战斗的理想场所。因为这里远离城市，就算闹出再大的动静，也不会有人来管。\n\n月光如水，洒在地面上，将整个荒野照得如同白昼。\n\n林恩和罗恩相对而立，两人之间的距离不足十米。其他人则站在远处，紧张地看着这场对决。\n\n月光下，罗恩的身影显得格外高大。他身后还站着几个护卫，每个人都是气息浑厚，显然都是训练有素的强者。\n\n“林恩，”罗恩冷笑道，“说实话，我很佩服你的勇气。明知道不是我的对手，还敢接受我的挑战。”\n\n“废话少说。”林恩淡淡地道，“动手吧。”\n\n“好！那就让我看看，你的实力是否跟你的嘴皮子一样厉害！”\n\n罗恩身上勐地爆发出一股强大的气息。\n\n六级血脉战士巅峰！\n\n恐怖的气息如同一座大山般压向林恩，周围的空气仿佛都凝固了。在他的身后，隐约有一道银色的狼影浮现，那是夜语家族的血脉象征——银月之狼！\n\n银月之狼——夜语家族的血脉图腾，传说中是银月女神的宠物，拥有操控月光和风的力量。\n\n“好强大的气息！”观战的护卫们纷纷变色。\n\n“这才是少主的真正实力！”\n\n“六级巅峰太强了，那个林恩死定了！”\n\n“少主加油！教训这个叛徒！”\n\n六级血脉战士的气息如同一座小山般压向林恩，然而林恩却站的笔直，没有丝毫退缩。他的身体如同磐石一般稳固，那双向来平静的眼眸中此刻燃烧着战斗的火焰。\n\n“喝！”\n\n林恩同样爆发出气息，虽然只有四级中期，但气势竟然不弱于六级血脉战士！\n\n“什么？！”罗恩脸色微变，“这不可能！四级中期怎么会有这么强的气息？！”\n\n四级中期和六级巅峰，差了整整两个大等级！这在任何人看来都是不可能的事情！\n\n然而，事实摆在由不得他不信。\n\n“这有什么不可能的？”林恩冷笑一声，“你做不到的事情，不代表别人做不到。”\n\n“这一定是假的！”罗恩难以置信地道，“一定是用了什么秘法！没关系，不管你用什么方法提升实力，今天都别想活着离开！”\n\n林恩没有解释，身形一闪，朝罗恩冲了过去。他的速度极快，眨眼间就跨越了数米的距离。\n\n“找死！”\n\n罗恩冷笑一声，同样冲了上来。\n\n两人的战斗瞬间爆发！\n\n“轰！”\n\n一声巨响，两人的剑芒在空中相撞，爆发出一阵刺眼的光芒。强大的气流将周围的尘土卷起，形成了一个小小的漩涡。\n\n观战的众人都被这股气流逼得后退了几步。\n\n“好强！”泰勒等人纷纷变色。\n\n“这，就是六级血脉战士的实力吗？”戈克喃喃道，“仅仅是战斗的余波，就让人喘不过气来！”\n\n“担心也没有用了。”卡尔按住泰勒的肩膀，“相信林恩，他不是冲动的人。”\n\n没错，硬拼了一击之后，林恩竟然没有落败！\n\n罗恩的脸色变得极为难看。他本以为这一击就能解决林恩，没想到对方竟然接住了！\n\n“这不可能……”罗恩喃喃道，“四级中期怎么可能接住我的攻击？！”\n\n“有点意思。”罗恩阴沉着脸道，“看来我还是小看你了。”\n\n“你小看我的事情，还多着呢。”林恩淡淡地道。\n\n战斗继续升级。两人都是年轻一代的佼佼者，打起来自然是精彩纷呈。剑芒四射，气劲纵横，整个空地都被他们的战斗余波笼罩。\n\n林恩手中的长剑化作一道银色闪电，直取罗恩的胸口。\n\n罗恩不闪不避，同样是一剑迎上。\n\n“铛——”\n\n金铁相交的声音响起，两人的剑在空中相撞，火花四溅。\n\n“好！”罗恩大喝一声，“再来！”\n\n他的攻击变得更加勐烈，剑势如狂风骤雨般倾泻而下。\n\n林恩不断格挡，但每接一剑，他的手臂都会感到一阵麻木。\n\n“好强的力量！”林恩心中暗暗叫苦。\n\n六级血脉战士的力量果然不是四级能够相比的。若不是他体内的暗影血脉足够强大，再加上死神传承的强化，他根本不可能挡住罗恩的攻击。\n\n“不错嘛，竟然能接住我这么多招。”罗恩冷笑道，“不过热身结束了，接下来我要认真了。”\n\n话音刚落，罗恩的气息勐地暴涨。\n\n“风之领域！”\n\n六级血脉战士的标志性能力——领域！\n\n在罗恩的身体周围，形成了一个无形的领域。在这个领域内，风元素的力量为他所用，他的速度、力量、反应能力都会大幅提升！\n\n“什么？！”林恩变色了。\n\n领域的威力，他曾经听莫雷导师说过。那是六级血脉战士的标志，只有领悟了领域的强者，才能算是真正的六级！\n\n“受死吧！”\n\n罗恩的身形在领域中消失不见。\n\n“小心后面！”黛西尖叫道。\n\n林恩勐地转身，但已经来不及了。\n\n“噗——”\n\n罗恩的长剑刺穿了林恩的肩膀，鲜血飞溅。\n\n“呃啊！”林恩闷哼一声，身形暴退。\n\n“反应太慢了。”罗恩的身影出现在林恩身后，冷笑道，“在风之领域内，我的速度是无敌的！”\n\n林恩咬紧牙关，肩膀上的伤口传来剧痛，鲜血染红了他的衣服。\n\n“林恩！”黛西泪流满面。\n\n“继续！”罗恩再次消失。\n\n林恩咬紧牙关，勉强挡住罗恩的攻击。但每一次碰撞，他都会受伤。\n\n不行，这样下去会被耗死的！\n\n林恩心念一动，决定反击。\n\n“暗影冲击！”\n\n林恩勐地爆发出暗影之力，一道黑色冲击波朝罗恩袭去。\n\n罗恩冷笑一声，同样爆发出血脉之力。\n\n“风之壁垒！”\n\n一道风墙出现在罗恩面前，轻易地挡下了暗影冲击。\n\n“没用的。”罗恩道，声音中满是不屑，“风之血脉克制一切黑暗力量。你的暗影魔法对我无效！”\n\n林恩眼神一沉。他知道罗恩说的是实话。风之血脉擅长速度和防御，正好克制他的暗影魔法。\n\n“看来只能用那一招了……”\n\n林恩深吸一口气，身上开始散发出一股诡异的气息。\n\n“这是什么？”罗恩皱眉看着林恩的变化。\n\n林恩的身体开始变得透明，整个人仿佛与黑暗融为一体。\n\n“暗影形态！”\n\n这是林恩突破四级后获得的新能力——暗影形态。在这个形态下，他的速度、力量都会大幅提升，而且免疫大部分物理攻击！\n\n“什么？！”\n\n罗恩变色了。他能感觉到，切换形态后的林恩气息变强了很多，竟然隐隐有与他抗衡的趋势。\n\n“不可能！”罗恩难以置信地道，“四级中期怎么可能会这么强？！”\n\n林恩没有回答，身形一闪，消失在原地。\n\n罗恩心中一凛，连仙警惕起来。\n\n突然，林恩出现在罗恩身后，一剑刺向他的后背。\n\n“太快了！”\n\n罗恩仓促间回身格挡，但还是被林恩的力量震退了几步。\n\n“好！”观战的泰勒等人顿时欢唿起来。\n\n罗恩稳住身形，脸色变得极为难看。\n\n“很好，你成功激怒了我。”罗恩冰冷地道，“接下来，我会认真了！”\n\n话音未落，罗恩的气息勐地暴涨。\n\n“风之领域！”\n\n领域再次展开，但这一次，领域的范围和强度都比刚才大了许多！\n\n“受死吧！”\n\n罗恩的身形快如闪电，每一次攻击都带着刺耳的风声。\n\n林恩咬紧牙关，苦苦支撑。\n\n在绝对的实力的差距面前，任何技巧都是徒劳的。\n\n“不行，差距太大了……”林恩心中暗暗叫苦。\n\n虽然他能够越级战斗，但罗恩可是六级巅峰的强者，距离七级也只有一步之遥。这种绝对的实力差距，不是技巧能够弥补的。\n\n“结束了！”\n\n罗恩抓住林恩的一个破绽，一掌拍向他的胸口。\n\n“小心！”黛西尖叫道。\n\n“噗！”\n\n林恩喷出一口鲜血，整个人倒飞出去。\n\n“林恩！”黛西惊呼，就要冲上去。\n\n“别冲动！”卡尔拦住她，“现在上去只会让林恩分心！”\n\n“可……”黛西眼眶都红了。\n\n林恩从地上爬起来，擦掉嘴角的血迹。\n\n“还没完呢……”林恩咬牙道。\n\n“你还在坚持什么？”罗恩冷笑道，“明知道不是对手，还要继续受苦，何必呢？”\n\n“因为我是林恩·夜语。”林恩道，声音坚定，“永远不会放弃的夜语！”\n\n他的眼神前所未有的坚定，那是不屈的意志，是战斗到最后一刻的决心！\n\n看着林恩的眼神，罗恩心中突然涌起一股寒意。\n\n那是什么样的眼神？\n\n仿佛来自深渊的恶魔，充满了绝望和不甘，充满了战斗到最后一刻的意志！\n\n“你这个怪物……”罗恩喃喃道。\n\n林恩再次冲了上来。\n\n接下来的战斗，变成了一场单方面的虐打。\n\n罗恩的风之领域实在太强大了，林恩根本找不到反击的机会。\n\n一次又一次地被击倒，一次又一次地站起来。\n\n林恩的全身已经伤痕累累，鲜血染红了他的衣服。\n\n“够了！”黛西泪流满面，“不要再打了！”\n\n“林恩，认输吧！”泰勒也道，“我们不丢人！”\n\n“不……”林恩艰难地道，摇摇晃晃地站起来，“我还没有输……”\n\n“为什么？为什么还要坚持？”罗恩皱眉道，“你已经尽力了……再这样下去，你会死的！”\n\n“因为……”林恩艰难地抬起头，眼神前所未有的坚定，“因为我不能输。我输了，就会死。我死了，就再也见不到我想见的人……”\n\n“所以，我不能输……”\n\n这就是林恩的信念。\n\n为了保护重要的人，为了不再逃避，为了证明自己的价值——他不能输！\n\n罗恩看着林恩的眼神，心中突然涌起一股寒意。\n\n那眼神……仿佛来自深渊的恶魔，让人心悸。\n\n“你这个怪物……”罗恩喃喃道。\n\n然而就在这时，林恩身上的气息开始急剧攀升。\n\n“这……这是怎么回事？！”\n\n罗恩变色了。\n\n林恩的气息正在快速提升——四级后期……四级巅峰……\n\n然后，突破了！\n\n五级！\n\n“不可能！”罗恩惊呼出声，“战斗中突破？！”\n\n这是林恩在生死之间激发了潜能，意外突破到了五级！\n\n在死亡的压迫下，在绝不放弃的意志支撑下，林恩竟然突破了！\n\n血脉战士的突破往往需要长时间的积累和领悟，但在生死关头的顿悟，往往能够起到意想不到的效果！\n\n“罗恩……”林恩的声音仿佛来自九幽，“现在，战斗才刚开始……”\n\n林恩的身体勐地爆发出强烈的暗影光芒，整个人如同浴血的战神。\n\n“再来！”\n\n林恩的身形消失在原地。\n\n罗恩心中一凛，连仙警惕起来。\n\n“在这里！”\n\n林恩突然出现在罗恩身后，一剑斩下。\n\n仓促间，罗恩举起手臂格挡。\n\n“咔嚓！”\n\n清脆的骨折声响起。\n\n罗恩的手臂被斩断了！\n\n“什么？！”罗恩难以置信地看着自己的断臂，鲜血喷射而出，“这……这不可能……”\n\n“没有什么不可能。”林恩冰冷地道，“这是你逼我的……”\n\n林恩再次消失在原地。\n\n“不……不要……”罗恩惊恐地道。\n\n“太晚了……”\n\n然而就在这时，一股强大的气息突然出现。\n\n“够了！”\n\n一只苍老的手掌凭空出现，抓住了林恩的手腕。\n\n林恩想要挣脱，却发现那只手掌的力量大得惊人，以他现在的实力竟然无法撼动分毫。\n\n“莫雷导师？！”林恩抬头看去，只见莫雷导师不知何时出现在了他们身边。\n\n月光下，莫雷导师的身影显得格外高大。那张饱经风霜的脸上此刻写满了威严，目光如炬般盯着罗恩。\n\n“到此为止了。”莫雷导师淡淡地道。\n\n林恩犹豫了一下，最终松开了手中的剑。\n\n罗恩此刻已经是进气多出气少，刚才那一剑虽然没有要了他的命，但也让他身负重伤。若不是莫雷导师及时出手，他今天可能就要交代在这里了。\n\n“多……多谢莫雷导师……”罗恩的护卫们赶紧跑过来，扶起罗恩。\n\n“你们可以走了。”莫雷导师道，声音不大，但却带着不容置疑的威严，“记住，这里是银火城，不是你们夜语家族的地盘。如果再敢来骚扰我的弟子，就别怪我不客气了。”\n\n罗恩怨毒地看了林恩一眼，被人扶着离开了。\n\n临走前，他回头看了一眼林恩，那眼神充满了杀意和恨意。\n\n“林恩……你给我等着……我一定会回来报仇的……”\n\n看着夜语家族的人离开，林恩再也支撑不住，整个人向后倒去。\n\n“林恩！”黛西冲过来，泪流满面地接住林恩。\n\n“没事……”林恩虚弱地笑了笑，随即昏了过去。\n\n莫雷导师看着昏迷的林恩，眼中闪过一丝复杂的光芒。\n\n“这个孩子……真是不要命了……”\n\n他转身看向泰勒等人，道：“把他抬回学派医务室，好好治疗。”\n\n“是！”众人齐声道。\n\n月光下，莫雷导师的目光变得深邃起来。\n\n“夜语家族……看来我们之间的梁子是结下了……”\n\n银火城内，夜色如墨。\n\n一场惊心动魄的战斗，就此落幕。\n\n但所有人都知道，这只是一个开始。夜语家族不会善罢甘休，更大的风暴还在后面……\n\n（本章完）"},
{"n":59,"t":"第59章：学派的立场（二）","c":"银火学派，医务室。\n\n清晨的第一缕阳光透过窗户洒落在病床上，林恩缓缓睁开眼睛，感觉全身都在酸痛。\n\n那是一种深入骨髓的疼痛，仿佛每一个细胞都在哀嚎。\n\n“你醒了？”莫雷导师的声音从旁边传来。\n\n“导师……”林恩想要起身，却感觉全身酸痛，几乎使不上力气。\n\n“别动。”莫雷导师按住他，“你这次伤的太重了，需要好好休息。”\n\n林恩这才注意到自己全身都缠满了绷带，体内气血翻涌，显然受伤不轻。昨夜的战斗，他承受了太多的伤害，若不是最后关头突破到五级，只怕现在已经是个死人了。\n\n“导师，罗恩呢？”林恩问道。\n\n“他已经走了。”莫雷导师道，“我警告过他们，如果再来就不会客气。”\n\n“谢谢导师。”林恩道。\n\n“谢什么？”莫雷导师叹了口气，“你是我的弟子，保护你是应该的。”\n\n话锋一转，莫雷导师又道：“但是林恩，你知道这次有多危险吗？如果你不是战斗中意外突破，现在你已经是个死人了！”\n\n“弟子知错。”林恩道。\n\n“知错？”莫雷导师摇头道，“你没错。你只是做了你认为对的事情。”\n\n“导师……”\n\n“但是，”莫雷导师严肃地道，“你要明白一件事。真正的强者，不是只会蛮勇的匹夫，而是懂得审时度势的智者。你现在最重要的任务是活着，只有活着，才能变得更加强大。如果你死了，就什么都没有了。”\n\n“弟子明白了。”林恩道，“弟子以后会更加谨慎，不会再这么冲动了。”\n\n“这就好。”莫雷导师道，“你好好休息吧。我已经安排人加强了对你的保护，这段时间你就不要离开学派了。等你伤好了，我有重要的事情要告诉你。”\n\n“是。”林恩道。\n\n莫雷导师离开后，黛西、泰勒、卡尔、戈克都走进了病房。\n\n“林恩，你醒了！”戈克兴奋地道。\n\n“太好了，你没事！”泰勒也道。\n\n黛西则是走到床边，轻轻握住林恩的手：“你吓死我了……”\n\n“我这不是没事吗？”林恩虚弱地笑了笑。\n\n“你还说！”黛西眼眶又红了，“你知道当时有多危险吗？如果你不是突破到五级……”\n\n当时的场景，黛西至今想起都后怕。若不是林恩在最后关头突破，现在她可能已经失去他了。\n\n“对不起，让你们担心了。”林恩真诚地道，“我保证，以后不会再让你们这么担心了。”\n\n“行了，既然林恩醒了，我们就放心了。”卡尔道，“让他好好休息吧。”\n\n众人点点头，纷纷离开了病房。\n\n黛西留了下来，照顾林恩的起居。\n\n接下来的几天，林恩安心在医务室养伤。\n\n虽然这次受伤不轻，但他的实力也有了突破。从四级中期提升到五级，这是一个巨大的跨越。\n\n血脉战士的五级是一个重要的分水岭。进入五级之后，血脉之力会产生质变，战斗力会大幅提升。\n\n现在的林恩，虽然只是五级初期，但战斗力已经可以与六级血脉战士抗衡。如果算上暗影魔法和死神传承，他的真实实力甚至可以挑战七级！\n\n这就是越级战斗的恐怖之处！\n\n“林恩，”这天，黛西端着一碗鸡汤走进病房，“这是我亲手熬的鸡汤，你尝尝。”\n\n“谢谢你，黛西。”林恩道。\n\n“跟我还客气什么？”黛西道，“对了，莫雷导师让你去议事大厅，说有重要的事情要宣布。”\n\n“重要的事情？”林恩一怔，“什么事？”\n\n“我也不清楚，”黛西道，“但看起来很严肃的样子。你先喝完鸡汤，我陪你去。”\n\n“好。”\n\n不一会儿，林恩在黛西的搀扶下来到议事大厅。\n\n大厅内，莫雷导师端坐在主位之上，身后还站着几位学派的长老。在大厅中央，罗恩·夜语带着几个护卫站立在那里，但此刻的他完全没有之前的傲慢，显得十分恭敬。\n\n甚至可以说是——谦卑！\n\n林恩走进大厅，目光与罗恩对视。两人的眼神在空中碰撞，仿佛有火花闪现。\n\n罗恩看向林恩的眼神中充满了恨意和杀意，但更多的却是忌惮。\n\n毕竟，林恩昨天展现出的实力，实在是太恐怖了。五级初期就能力压六级巅峰，若是让他成长起来，那还得了？\n\n“林恩，”莫雷导师道，“你来了。”\n\n“导师。”林恩恭敬地道。\n\n“今天的会议，是关于你的事情。”莫雷导师道，“夜语家族的人想要一个说法，我也想趁此机会，表明我们银火学派的立场。”\n\n林恩心中一动，看向罗恩。\n\n罗恩的脸色很难看，但更多的是愤怒和不甘。\n\n“莫雷大师，”罗恩上前一步，恭敬地道，“我们夜语家族对上次的事情深表遗憾。林恩虽然是我们家族的叛逆，但既然他已经加入了银火学派，就是学派的人。我们不应该在学派门口闹事。”\n\n这番话说的倒是漂亮，但林恩知道，这只是夜语家族的缓兵之计。\n\n“罗恩，”莫雷导师淡淡地道，“你今天来，究竟想说什么？”\n\n罗恩深吸一口气，道：“我是来道歉的。上次的事情，是我们夜语家族唐突了。但林恩毕竟是我们家族的叛逆，偷走了家族的秘宝'月影之泪'。我们希望学派能够理解，让我们带回林恩，进行家族审判。”\n\n“家族审判？”莫雷导师冷笑一声，“说的好听，你们夜语家族的审判，不就是处死吗？”\n\n罗恩沉默了。\n\n“林恩是我的弟子。”莫雷导师站起身，强大的气息瞬间爆发，“他的事情，我管定了。谁敢动他，就是与我为敌，与整个银火学派为敌。”\n\n大厅内的气氛瞬间变得紧张起来。\n\n八级血脉战士的威压，让在场的每一个人都感到唿吸困难。\n\n罗恩咬紧牙关，道：“莫雷大师，您真的要为了一个弟子，与我们夜语家族为敌？”\n\n“为敌？”莫雷导师冷笑一声，“如果你们夜语家族要与我为敌，那我也奉陪到底！”\n\n强大的威压让罗恩不由自主地后退了一步。他能感觉到，莫雷导师的实力深不可测，绝对不是他能够对抗的。\n\n八级血脉战士——这可是站在整个银月公国巅峰的存在！\n\n“莫雷大师，”罗恩深吸一口气，强行压下心中的怒火，“您应该知道，夜语家族的势力遍布银月公国。得罪了我们，可没有好下场。”\n\n“威胁我？”莫雷导师身上气息再涨，“别以为你们夜语家族了不起，这里是银火城，不是你们能撒野的地方！”\n\n罗恩变色后退。他知道，今天的事情已经无法善了了。\n\n“好，很好。”罗恩阴沉着脸道，“莫雷大师，今日之事我会如实禀报家族。我们走！”\n\n说完，罗恩一挥手，带着护卫转身离开。\n\n临走前，他回头看了一眼林恩，眼中闪过一丝阴狠。\n\n“林恩·夜语，你给我等着。总有一天，我会让你付出代价的！”\n\n看着他们离开的背影，莫雷导师的脸色变得极为难看。\n\n“莫雷，”一位长老担忧地道，“这样做好吗？夜语家族可是银月公国的大贵族，得罪了他们……学派以后的日子只怕不好过啊。”\n\n“怕什么？”莫雷导师道，语气中带着几分傲然，“我们银火学派立足银火城这么多年，什么风浪没有见过？如果今天我退缩了，以后还怎么在徒弟们面前抬起头？”\n\n话虽如此，但莫雷导师心中也明白，夜语家族势力庞大，这次事件绝不会善罢甘休。\n\n“林恩，”莫雷导师看向林恩，语气缓和下来，“今天的事情你看到了。夜语家族不会放过你的，但你放心，只要有我莫雷在一天，他们就不敢动你。”\n\n“弟子明白。”林恩道，“谢谢导师。”\n\n“我们是师徒，不需要说谢。”莫雷导师道，“你现在最重要的任务是养好伤，然后继续修炼。只有变得更强，才能保护自己想要保护的人。”\n\n“是！”林恩坚定地道。\n\n然而就在这时，一个护卫匆匆跑了进来。\n\n“莫雷导师！不好了在！罗恩带人在学派门口闹事，说要见林恩！”\n\n“什么？”莫雷导师勐地站起来，“他还有完没完了？！”\n\n他大步朝外走去。\n\n银火学派门口。\n\n罗恩去而复返，这一次他带来了更多的高手。除了之前的护卫，还有一些气息更为强大的存在。\n\n“莫雷大师，”罗恩冷笑道，“我改变主意了。既然您不愿意交人，那我就自己进去抓！”\n\n“你敢！”莫雷导师怒道。\n\n“我有什么不敢的？”罗恩冷笑道，“别以为您是八级血脉战士就能保住他。我夜语家族有的是高手！”\n\n他身后，一个黑袍老者走上前来，身上散发着七级血脉战士的气息！\n\n“七级？！”莫雷导师脸色微变。\n\n“莫雷，”黑袍老者淡淡地道，“久违了。”\n\n“是你……夜语家族的供奉！”莫雷导师脸色变得极为难看。\n\n夜语家族的供奉，那都是成名多年的强者，实力深不可测。\n\n“莫雷，”黑袍老者道，“我劝你不要太冲动。夜语家族的实力，不是你能想象的。你如果执意要保护这个叛徒，休怪我们不客气！”\n\n“不客气？”莫雷导师冷笑一声，“那就来试试看！”\n\n他身上勐地爆发出一股强大的气息，八级血脉战士的威压瞬间笼罩整个广场。\n\n黑袍老者同样爆发出气息，两股强大的力量在空中碰撞，爆发出惊天动地的巨响。\n\n“轰！”\n\n整个广场都在颤抖，地面出现裂纹，房屋摇摇欲坠。\n\n学徒们惊恐地后退在这股威压下，连站立都困难。\n\n“够了！”黑袍老者突然收回气息，“莫雷，你真的要与我们夜语家族为敌？”\n\n“为敌？”莫雷导师冷笑一声，“是你们夜语家族先来找麻烦的！我再说一遍，林恩是我银火学派的弟子，谁敢动他，就是与整个学派为敌！”\n\n他的声音如雷，在整个银火城回荡。\n\n“好好好！”黑袍老者连说三个好字，“莫雷，你很好。夜语家族记住你了。”\n\n说完，他带着罗恩等人转身离开。\n\n临走前，罗恩回头看了一眼林恩，那眼神充满了杀意和恨意。\n\n“林恩·夜语，你给我等着。总有一天，我会让你求生不得，求死不能！”\n\n看着他们离开的背影，莫雷导师的脸色变得极为难看。\n\n“导师……”林恩走上前，眼中满是担忧。\n\n“不用担心。”莫雷导师道，声音中带着一丝疲惫，但更多的是坚定，“他们暂时不敢再来了。”\n\n话虽如此，但莫雷导师心中明白，夜语家族不会善罢甘休。这次事件之后，他们之间的梁子算是结下了。那些大家族的行事风格他再清楚不过，睚眦必报是他们的本能。\n\n“导师，您没事吧？”林恩注意到莫雷导师脸上的疲惫，关切地问道。\n\n“我能有什么事？”莫雷导师摆摆手，“倒是你，刚受过伤，又强行动用血脉之力，好好回去休息。”他顿了顿，又道，“记住今天的教训，冲动是最愚蠢的行为。”\n\n“是，弟子记下了。”林恩恭声道。\n\n银火城外，夜语家族的营地。\n\n罗恩坐在主营中，脸色阴沉的可怕。他的手臂已经包扎好了，但断臂之痛依然让他龇牙咧嘴。\n\n“少主，”一个护卫小心翼翼地道，“您没事吧？”\n\n“你说呢？”罗恩愤怒地道，“那个林恩，竟然敢断我的手！这个仇，我一定要报！”\n\n“少主息怒，”护卫道，“莫雷那个老家伙明显要护着林恩，我们总不能硬闯吧？”\n\n“硬闯？”罗恩冷笑一声，“你以为我刚才真的想动手？莫雷的实力深不可测，真打起来，我们这些人加起来都不是他的对手。”\n\n“那您的意思是……”\n\n“软的不行，那就来硬的。”罗恩眼中闪过一丝阴狠，“既然他不肯交人，那我们就让林恩自己走出来。我就不信，他能一辈子躲在学派里不出来。”\n\n“您的意思是……”\n\n“准备一下，今晚动手。”罗恩道，“记住，不要在学派内部动手，动静太大了。想办法把他引出来，在城外解决他。到时候死无对证，莫雷就算想追究也找不到证据。”\n\n“是！少主英明！”护卫恭维道。\n\n然而就在这时，一个苍老的声音突然响起。\n\n“这么说，你们夜语家族是要与我们银火学派为敌了？”\n\n“什么人？！”罗恩勐地站起来，拔出长剑。\n\n帐幕被掀开，莫雷导师缓步走进营帐。他的身后，还跟着几个学派的长老。\n\n每个人的身上都散发着强大的气息，竟然都是七级以上的强者！\n\n“莫雷大师？！”罗恩变色道，“您怎么来了？”\n\n“我为什么不能来？”莫雷导师淡淡地道，“怎么？只允许你们夜语家族堵在我们学派门口，就不允许我们来你们营地逛逛？”\n\n罗恩的脸色变得极为难看。他知道，莫雷导师既然敢来，就有把握控制整个局面。\n\n“莫雷大师，”罗恩强行压下心中的恐惧，道，“您这是什么意思？我们可是银月公国的合法贵族，您这样做，是不是太不把公国放在眼里了？”\n\n“少拿公国来压我。”莫雷导师冷笑一声，“如果夜语家族真的要与我们银火学派为敌，我也不介意奉陪到底。”\n\n他身上勐地爆发出一股强大的气息，八级血脉战士的威压瞬间笼罩整个营帐。\n\n罗恩等人脸色大变，在这股威压下，他们连站立都困难。\n\n“八……八级？！”罗恩难以置信地道，“您已经是八级血脉战士了？！”\n\n“不错。”莫雷导师淡淡地道，“所以，你们最好给我老实一点。如果再敢打林恩的主意，就别怪我不客气了。”\n\n罗恩咬紧牙关，心中充满了屈辱和不甘。但他也知道，在绝对的实力面前，任何反抗都是徒劳的。\n\n“莫雷大师，”罗恩艰难地道，“我明白了。我们……我们不会再找林恩的麻烦了。”\n\n“很好。”莫雷导师收回气息，“记住你今天说的话。如果让我发现你们夜语家族再敢动林恩一根汗毛，我就让你们夜语家族后悔出生在这个世界上。”\n\n说完，莫雷导师转身离开。\n\n看着莫雷导师离开的背影，罗恩的脸色变得极为难看。\n\n“少主，”护卫小心翼翼地道，“现在怎么办？”\n\n“怎么办？”罗恩冷笑一声，“当然是回去搬救兵！莫雷这个老家伙欺人太甚，真以为我们夜语家族怕了他不成？”\n\n“少主英明！”护卫道，“只要家族派来更强者，莫雷就算再厉害，也不可能一直护着那个林恩。”\n\n“没错。”罗恩眼中闪过一丝阴狠，“林恩·夜语，你给我等着。总有一天，我会让你求生不得，求死不能！”\n\n银火学派，议事大厅。\n\n莫雷导师坐在主位上，面色严肃。\n\n“导师，”林恩恭敬地道，“谢谢您又帮了我一次。”\n\n“谢什么？”莫雷导师道，“你是我的弟子，保护你是应该的。”\n\n他顿了顿，又道：“但是林恩，你要明白一件事。我能帮你一时，帮不了一世。总有一天，你需要靠自己的力量去面对敌人。”\n\n“弟子明白。”林恩道，“弟子一定会努力修炼，早日变得足够强大。”\n\n“这就好。”莫雷导师道，“我已经决定了，从今天起，你就是学派的核心学徒。我会亲自指导你修炼，直到你成为真正的强者。”\n\n“真的？！”林恩眼中闪过一丝喜色。\n\n核心学徒！那可是学派中最顶尖的学徒才能获得的身份！\n\n整个银火学派，学徒数以千计，但核心学徒的数量不超过五十人！\n\n每一个核心学徒，都是天赋异禀的天才，拥有远超常人的实力和潜力。\n\n而且，成为核心学徒之后，可以享受学派最顶尖的资源，包括修炼室、药材、魔法典籍等等！\n\n“怎么？不相信？”莫雷导师微微一笑。\n\n“不！弟子相信！”林恩激动地道，“谢谢导师！”\n\n“你我之间，不需要说谢。”莫雷导师道，“只要你能够健康成长，变得强大，就是对我最好的回报。”\n\n林恩看着莫雷导师，心中涌起一股暖意。\n\n这就是他的导师——莫雷·银焰，一个真正的强者，一个值得尊敬的长者。\n\n“导师，”林恩真诚地道，“您放心，我一定不会让您失望的。”\n\n“我相信你。”莫雷导师道，“去吧，好好养伤。等伤好了，就来找我开始特训。”\n\n“是！”林恩恭敬地道。\n\n离开议事大厅，林恩的心情久久不能平静。\n\n成为核心学徒——这可是他以前想都不敢想的事情。在夜语家族的时候，他不过是一个被忽视的庶子，没有任何资源倾斜，没有任何重视。而现在，他不仅成为了银火学派的弟子，还获得了核心学徒的身份！\n\n这是命运的转折点吗？\n\n他回头看向远方，夜语家族营地的方向。那里，曾经是他的家，现在却是他的敌人。\n\n“罗恩……夜语家族……”林恩喃喃道，眼中闪过一丝寒芒，“总有一天，我会让你们后悔的。”\n\n这一天，不会太远。\n\n他在心中暗暗发誓，总有一天，他会站在夜语家族面前，让他们为曾经的轻视和迫害付出代价。那些曾经羞辱他的人，那些将他推向深渊的人，都将仰望他的存在。\n\n医务室内，林恩躺在病床上，回想着今天发生的事情。\n\n莫雷导师的强势表态，让他感受到了久违的温暖。在这个世界上，除了死去的母亲，还有人愿意无条件地保护他。\n\n这就是师徒之情吗？\n\n林恩心中涌起一股复杂的情绪。\n\n曾经，他是夜语家族的弃子，被驱逐出家族，受尽嘲笑和屈辱。\n\n现在，他是银火学派的弟子，有导师的庇护，有伙伴的支持。\n\n“林恩，”黛西轻轻走进来，“你在想什么呢？”\n\n“在想导师的事情。”林恩道，“如果没有导师，我可能已经被夜语家族带走了。”他叹了口气，“我欠导师的太多了。”\n\n“莫雷导师对你真的很好。”黛西道，“他不仅实力强大，而且为人正直。有这样的导师，是你的福气。”她顿了顿，又道，“而且，他今天展现出的实力真的很恐怖，八级血脉战士……那可是站在金字塔顶端的存在啊。”\n\n“八级吗？”林恩喃喃道，眼中闪过一丝向往，“总有一天，我也会达到那个境界。”\n\n“我相信你。”黛西认真地道，“林恩，你一定可以的。”\n\n林恩看着黛西，突然笑了：“黛西，谢谢你。”\n\n“谢什么？”黛西俏脸微红，“我们是伙伴嘛。”\n\n“对，伙伴。”林恩道，“永远都是。”\n\n两人相视一笑，一切尽在不言中。\n\n窗外，月亮升起，银色的月光洒在银火城上，为这座城市增添了一丝神秘色彩。\n\n而林恩知道，这只是开始。总有一天，他会站在这个世界的巅峰，让所有敌人都仰望他的存在。\n\n夜语家族，你们准备好了吗？\n\n银火学派深处，莫雷导师站在银焰塔的顶端，俯视着整个学派。\n\n“林恩……”他喃喃道，“希望你能快速成长起来吧。这个世界，即将发生巨变了……”\n\n他的目光深邃，仿佛能够看透未来。\n\n“阴影纪元……终于要来了吗？”\n\n夜空中，银月高悬。\n\n而在大地的某个角落，阴影正在悄然蔓延……\n\n三天后，林恩的伤基本痊愈了。\n\n这三天里，莫雷导师亲自为他治疗，用上了学派最好的药材，效果自然是非同凡响。\n\n“林恩，”莫雷导师道，“从今天起，你就是学派的核心学徒了。这是你的身份令牌。”\n\n林恩接过令牌，令牌是银色的，正面刻着银火学派的标志，背面刻着他的名字。\n\n“谢谢导师。”林恩道。\n\n“去吧，”莫雷导师道，“去藏经阁挑选几本适合你的魔法典籍。核心学徒可以免费借阅三本。”\n\n“是！”林恩兴奋地道。\n\n藏经阁是银火学派最重要的建筑之一，里面收藏了数百年来学派收集的各种魔法典籍。\n\n林恩来到藏经阁，被眼前的景象震撼了。\n\n巨大的书架高耸入云，一眼看不到尽头。每一层书架都闪烁着魔法光芒，显然都加持了特殊的防护魔法。\n\n“这就是藏经阁吗？”林恩喃喃道。\n\n他开始挑选适合自己的典籍。\n\n《暗影魔法进阶》——这正是他需要的！\n\n《血脉共鸣原理》——讲解血脉战士如何与血脉产生共鸣，提升实力。\n\n《战斗技巧精要》——包含了各种战斗技巧和策略。\n\n林恩挑选了这三本典籍，如获至宝。每一本都价值连城，如果不是核心学徒的身份，他可能一辈子都无法接触到这些珍贵的知识。\n\n接下来的日子，林恩开始了紧张的修炼。\n\n白天，他在莫雷导师的指导下修炼血脉之力。莫雷导师的教导方式严厉而有效，每一个动作、每一次发力都有讲究。林恩仿佛一块干涸的海绵，疯狂地吸收着知识的甘露。\n\n晚上则研读魔法典籍。《暗影魔法进阶》让他对暗影魔法的理解更深了一层，《血脉共鸣原理》让他明白了血脉战士与血脉之间的微妙联系，《战斗技巧精要》则让他掌握了更多实用的战斗技巧。\n\n他的实力，在稳步提升。\n\n五级初期……\n\n五级中期……\n\n五级后期……\n\n距离六级，只有一步之遥！\n\n每一次突破都伴随着剧烈的痛苦，但林恩都咬牙坚持下来了。他知道，在这个弱肉强食的世界，只有实力才是最好的保障。\n\n而与此同时，夜语家族也在暗中积蓄力量，准备对林恩发动致命一击。\n\n一场更大的风暴，正在酝酿之中……\n\n（本章完）"},
{"n":60,"t":"第六十章：家族态度","c":"银月公国，夜语家族领地。\n\n作为银月公国最古老的贵族世家，夜语家族拥有着数百年的辉煌历史，势力庞大到令人窒息。家族的城堡建立在银月城的核心地带，占地方圆数里，宛如一座白色的巨兽匍匐在月光之下。城堡由寒铁石与银曜石建造而成，每一块石材都经过魔法加持，在月光下泛着淡淡的银色光辉，因此得名“银月城”。城堡周围设有三重魔法结界，配备超过两百名精锐护卫，寻常强者根本无法靠近半步。\n\n此刻，在城堡最深处的议事大厅中，一场关系到家族命运的高层会议正在进行。\n\n大厅中央悬挂着夜语家族的族徽——一轮银色的弯月下方，绣着一把黑色的死神镰刀。这是夜语家族最引以为傲的标志，代表着他们与死神传承的深厚渊源。议事厅内灯火通明，三十丈长的黑木会议桌旁坐满了家族高层，每个人的脸上都带着凝重的表情。大厅两侧站立着身着银色铠甲的护卫，他们目光如刀，气息浑厚，显然都是身经百战的强者。\n\n“罗恩的事情，你们都听说了吧？”说话的是一个白发苍苍的老者，他是夜语家族的大长老——维吉尔·夜语。大长老已经有两百三十岁的高龄，是家族中资历最老的存在，曾经跟随上一代家主南征北战，为家族的繁荣立下过汗马功劳。此刻他坐在主位上，浑浊的眼睛里精芒闪烁，仿佛能够看穿人心。\n\n“听说了。”二长老道，“罗恩在银火城被人打败，连手臂都断了。”\n\n“二长老，这就是你的不对了。”三长老是个中年男子，看起来六十岁左右，实际上已经活了两百多年，“罗恩是我们夜语家族的核心子弟，他被人打断手臂这么大的事情，你居然现在才知道？”\n\n“三长老，你这话是什么意思？”二长老脸色一沉，“罗恩在银火城发生的事情，第一时间就有人回报给家族了。倒是你，当时在干什么？”\n\n“你——”\n\n“够了！”大长老维吉尔冷冷地哼了一声，整个议事厅的温度仿佛骤然下降了几度，桌上的烛火都为之一暗。三长老和二长老同时打了个寒颤，不敢再争吵。大长老积威之重由此可见一斑。\n\n大厅里陷入了短暂的沉默，所有人的目光都集中在大长老身上，等待他接下来的话。\n\n“那个林恩·夜语真的那么厉害？”三长老有些不信，“据说他只是一个四级血脉战士，一个被家族驱逐的废物而已，怎么可能打败六级巅峰的罗恩？”\n\n“四级？”大长老维吉尔冷笑一声，那笑声中带着几分嘲讽和寒意，“如果只是四级，能够打败六级巅峰的罗恩？罗恩可是我们夜语家族重点培养的天才弟子，从小就觉醒了A级血脉‘月影之体’，更别说他在六级巅峰已经沉淀了将近十年，你告诉我一个四级废物能打断他的手？”\n\n“您的意思是……”三长老被大长老的语气弄得有些不安。\n\n“根据罗恩的护卫描述，”大长老维吉尔缓缓地道，声音不高却清晰地传入每个人耳中，“那个林恩在战斗中突破到了五级。而且他的战斗力远超同级对手，足以越级挑战六级强者。”\n\n“世上真的有如此天才？”二长老变色道，“四级击败六级，这等战力，就是放在整个符文大陆的历史上也是凤毛麟角！难道他是传说中千年难遇的绝代天骄不成？”\n\n“天才？”大长老维吉尔摇头道，脸上的表情变得愈发凝重，“如果只是天才，那还好办。关键是——”\n\n他故意停顿了一下，扫视了一圈议事厅里的众人。\n\n“——他继承了死神传承。”\n\n此言一出，全场皆惊。\n\n“什么？！”三长老猛地站起来，椅子在地面上摩擦出刺耳的声音，“死神传承？！就是那个传说中的‘冥主之匙’？！”\n\n“没错。”大长老维吉尔点了点头，“死神传承是这个世界最强大的传承之一。传说中，死神是冥界的主宰，掌握着生与死的终极奥秘。一旦继承了死神传承，就有可能成为下一任死神，掌控生死之力。”\n\n“死神传承不是在几千年前就消失了吗？”二长老难以置信地道，“当年死神陨落，所有的传承都应该跟着消亡才对……家族记载中，死神传承最后一次出现还是在三千年前，之后就彻底销声匿迹了。”\n\n“世界之大，无奇不有。”大长老维吉尔淡淡地道，“也许死神留下了什么后手也说不定。不过可以肯定的是，那个林恩确实继承了死神传承。罗恩的护卫亲眼看到，他使用了一种极其可怕的黑色力量，那种力量的气息……和传说中的死神之力一模一样，据说是冥界最深处的‘死亡凋零’之力。”\n\n大厅里再次陷入了沉默，每个人的脸上都露出了复杂的神情。有震惊，有贪婪，有忌惮，还有几分恐惧。\n\n死神传承的吸引力有多大，任何一个稍微了解魔法历史的人都知道。一旦得到死神传承，就有可能成为这个世界上最强大的存在，甚至有可能突破凡人的界限，达到神的境界。在符文大陆的历史上，死神传承曾经出现过三次，每一次都掀起腥风血雨，无数强者为之陨落。\n\n“可传承已经在他身上了……”二长老喃喃道，“总不能把他的传承剥夺出来吧？”\n\n“为什么不能？”三长老眼中闪过一丝贪婪的光芒，那目光仿佛要吃人一般，“死神传承的力量，只有在死亡后才能剥离。只要我们杀掉那个林恩……”\n\n“你以为死神传承是那么简单的东西？”大长老维吉尔冷笑，“死神传承有灵性，会自行选择宿主。如果宿主死亡，传承之力会立刻消散于天地之间，根本不可能被剥夺。老夫当年查阅过家族秘典，这死神传承是有灵性的至宝，只会主动选择宿主，绝不会被外力强行夺取。”\n\n“那怎么办？”三长老皱眉道，“总不能就这么放任他成长下去吧？万一他成长起来，第一个对付的就是我们夜语家族！”\n\n“当然不能。”大长老维吉尔道，“但是我们需要从长计议。死神传承不是普通的传承，一个不慎，可能给我们夜语家族带来灭顶之灾。稍有不慎，就是万劫不复的下场。”\n\n就在这时，一个冰冷的声音从议事厅门口传来。\n\n“大长老所言极是，不过孙儿有不同看法。”\n\n众人抬头看去，只见一个年轻人从外面走了过来。他身材修长，穿着一袭黑色的长袍，长相极为英俊，刀削般的脸庞棱角分明，最引人注目的是他的眼睛——那是一双深邃的黑色眼眸，仿佛能够看透人心，又仿佛深潭一般看不到底。最为独特的是他的气质，冷漠而正直，仿佛一把出鞘的利剑，浑身上下散发着生人勿近的气息。\n\n“布莱克？！”二长老惊讶地道，“你不是在外面执行任务吗？怎么这么快就回来了？”\n\n“孙儿听说家族出了大事，所以提前赶回来了。”布莱克·夜语淡淡地道，声音平静听不出任何情绪波动。\n\n布莱克是夜语家族家主的养子，虽然不是亲生的，但天赋异禀，年纪轻轻就已经达到了八级血脉战士的境界。是夜语家族年轻一代的第一强者，被誉为“银月之影”，在年轻一代中几乎无人能敌。\n\n夜语家族的家主一共收养了三个养子养女，布莱克是其中最出色的一人。他在十岁时觉醒血脉，一度被认为是有史以来最有天赋的夜语家族成员。十五岁突破到五级，二十岁突破到七级，如今二十三岁，已经达到了八级血脉战士的境界，距离九级只有一步之遥。传说中，他曾经在十八岁时独自一人斩杀过一头七级魔兽，名震银月公国。\n\n更重要的是，布莱克不仅实力强大，而且头脑精明、城府极深。他很少在人前表露真实情绪，永远都是那副波澜不惊的样子。也正是因为这份稳重，家主才会在暗中对他委以重任。家族中人都知道，布莱克是下一任家主的热门人选。\n\n“布莱克，你来得正好。”大长老维吉尔道，“对于林恩的事情，你有什么看法？”\n\n布莱克走到议事桌前，沉思片刻，道：“我认为，现在不是对付林恩的最好时机。”\n\n“为什么？”三长老急切地道，“他现在已经展现了恐怖的天赋，如果放任他成长下去，迟早会成为一个巨大的威胁！而且他身上还有死神传承，这个诱惑太大了！”\n\n“因为死神传承。”布莱克淡淡地道，仿佛在说一件稀松平常的事情，“如果林恩真的继承了死神传承，那他的潜力是无限的。现在杀了他，只会浪费这个传承。”\n\n“这话怎么说？”大长老维吉尔饶有兴趣地道。布莱克的分析引起了他的兴趣，这个养子果然没有让他失望。\n\n“死神传承的力量，取决于宿主的实力。”布莱克道，声音冷静而分析透彻，“宿主越强大，死神传承能够发挥出的威力就越恐怖。现在杀掉林恩，我们最多只能得到一个半成品的死神传承，价值大打折扣。而且根据记载，死神传承会在宿主死亡时自动消散，这是死神设下的禁制，防止传承被宵小之徒夺走。”\n\n“那你的意思是……”二长老若有所思地道。\n\n“等他成长起来。”布莱克道，语气平淡仿佛在讨论今天的天气，“然后再夺取他的传承。或者——”\n\n他顿了顿，眼神变得深邃起来。\n\n“如果我们能够控制住他，让他为我们所用，那岂不是更好？死神传承将成为我们夜语家族最大的底牌。”\n\n“这太冒险了！”三长老摇头道，“万一他成长到我们无法控制的地步……而且他已经被驱逐出家族了，心中肯定对我们充满怨恨，怎么可能为我们所用？”\n\n“那就再杀了他。”布莱克淡淡地道，仿佛在说一件微不足道的小事，“反正他有死神传承的秘密在我们手中，不怕他翻出天去。而且——”\n\n他顿了顿，眼神变得愈发深邃。\n\n“如果我所料不错，林恩现在一定在寻找各种方法来提升实力。死神传承虽然强大，但也是一把双刃剑，需要海量的资源来支撑修炼。如果他死了，传承会消散；如果他变得足够强大了，我们再杀掉他，传承就会自动成为无主之物，到时候……”\n\n后面的话，布莱克没有再说下去，但在场的人都明白了他的意思。想到死神传承可能落入自己家族手中，众人的眼中都闪过一丝火热。那可是死神传承啊，足以让一个家族成为大陆顶级势力的存在！\n\n大长老维吉尔沉思良久，最终点了点头。\n\n“布莱克说的有道理。”大长老道，“死神传承不是那么简单的东西。与其现在冒险击杀他，不如等他更强大之后再动手。这样我们不仅能得到完整的死神传承，还能趁此机会观察死神传承的奥秘。一举两得。”\n\n“那罗恩的事情就这么算了？”三长老不甘心地道，“他可是被打断了手臂，这对于我们夜语家族来说是奇耻大辱！而且罗恩是主母的侄子，这让我们如何向主母交代？”\n\n“当然不能就这么算了。”大长老维吉尔道，声音变得冰冷，“但也不用我们亲自出手。自然会有人替我们解决他。”\n\n“您是说……”二长老眼睛一亮，仿佛想到了什么。\n\n“黄晖教团。”大长老维吉尔道，眼中闪过一丝阴冷的光芒，“死神传承是黄晖教团最忌讳的东西。只要我们把消息透露给他们……”\n\n“高明！”三长老赞叹道，“黄晖教团一定会不惜一切代价击杀林恩，到时候我们只需要坐收渔翁之利！借刀杀人，不费吹灰之力！”\n\n大厅里响起了一片赞叹声，众人都对大长老的计策佩服不已。这就是大家族的行事风格，不费一兵一卒，就能让敌人灰飞烟灭。\n\n然而就在这时，布莱克突然开口了。\n\n“大长老，孙儿有一个请求。”\n\n“说。”大长老维吉尔道。\n\n“让孙儿去见林恩一面。”布莱克道，“孙儿有些事情想要确认。”\n\n大长老维吉尔深深地看了布莱克一眼：“你认识林恩？”\n\n“认识。”布莱克淡淡地道，“小时候的玩伴。”\n\n“是吗？”大长老意味深长地道，眼中闪过一丝精光，“那就由你去监视他吧。记住，不要让他死了。他对我们还有用。另外，顺便试探一下他现在的实力和态度。”\n\n“我知道了。”布莱克转身离开，背影挺拔如松。\n\n走出议事大厅，布莱克抬头看着天空，眼神变得复杂起来。\n\n天空一轮银月高悬，将银月城照得如同白昼。布莱克却仿佛没有看到这美丽的月色，只是喃喃自语。\n\n“林恩……”\n\n记忆中，那个瘦弱的少年还历历在目。\n\n那时候的林恩，还是一个无法觉醒血脉的废柴，被家族中的其他孩子欺负。他们嘲笑他、辱骂他、殴打他，而林恩总是默默承受，从不反抗。\n\n只有布莱克愿意和他玩。\n\n不是因为同情，而是因为一种奇怪的感觉。第一次看到林恩的时候，布莱克就有一种直觉——这个孩子不简单。他那沉默的眼神深处，藏着一种不属于这个年纪的坚韧与不屈。\n\n后来发生的事情，证明了布莱克的直觉是对的。\n\n林恩被驱逐出了夜语家族，布莱克也被家族重点培养，两人再也没有见过面。但布莱克一直在暗中关注着林恩的消息。\n\n他知道林恩在离开夜语家族后，经历了许多磨难。他知道林恩觉醒了血脉，加入了银火学派，成为了一名血脉战士。他知道林恩在短短几年内，就从一级提升到了四级……而现在，林恩更是继承了死神传承，成为了夜语家族必须重视的存在。\n\n“死神传承……”布莱克握紧拳头，指甲陷入了肉里，“也许，这是你的机遇……”\n\n随即，布莱克又苦笑一声。\n\n“但愿我们不会是敌人……”\n\n另一边，银火城，银火学派。\n\n林恩等人正在为前往死亡沼泽做准备。\n\n所谓死亡沼泽，是位于银火公国北部的一片广袤无垠的湿地。这片沼泽占地数千里，里面遍布着剧毒的瘴气、凶猛的魔兽，以及各种致命的陷阱。相传，这里是冥界与人界的交界处，蕴含着极其强大的死亡之力。自古以来，这里就是强者的埋骨之地，但也有无数冒险者在这里获得了天大的机遇，一飞冲天。\n\n历来，只有最强大的冒险者才敢踏入死亡沼泽。而能够从那里活着出来的人，无一例外都获得了巨大的机遇，实力突飞猛进。\n\n林恩等人决定去死亡沼泽，既是为了躲避夜语家族的追杀，也是为了寻找更强的力量。死神传承虽然强大，但需要的修炼资源也是一个天文数字，只有死亡沼泽这样的险地，才有可能提供足够的机遇。\n\n“林恩，”泰勒突然道，“有客人要见你。”\n\n“客人？”林恩一怔，“谁？”\n\n“一个自称布莱克的人。”泰勒道，“他说他是你的兄长……特意从银月城赶来的。”\n\n林恩的脸色瞬间变了。\n\n他当然知道布莱克是谁。\n\n那是小时候唯一一个愿意陪他玩的人，也是他曾经最信任的兄长。每次被其他孩子欺负的时候，只有布莱克会站出来帮他；每次饿肚子的时候，只有布莱克会偷偷给他送吃的……\n\n但现在，布莱克是夜语家族的人。\n\n而夜语家族，是他的敌人。\n\n“不见。”林恩冰冷地道。\n\n“为什么？”泰勒疑惑地道，“他说他只是想见你一面，没有恶意……”\n\n“没有恶意？”林恩冷笑一声，仿佛听到了世上最可笑的笑话，“夜语家族的人会有善意？他们巴不得我死！他们设计陷害我母亲，驱逐我出家族，现在又想置我于死地，你告诉我他们会有善意？”\n\n“可他说他叫布莱克，是你的兄长……”\n\n“正因为他是我的兄长，才更不能见。”林恩道，声音愈发冰冷，“我不想再跟那个家族有任何瓜葛。他们欠我的，我会亲自讨回来！”\n\n“可他说有重要的事情要告诉你，关于夜语家族的动向……”泰勒犹豫着说道。\n\n林恩沉默了。\n\n夜语家族的动向……\n\n这确实是他目前最需要的情报。知己知彼，方能百战百胜。\n\n“先让他进来吧。”就在这时，卡尔突然道。\n\n“卡尔？！”林恩皱眉道，“你……”\n\n“先听听他说什么。”卡尔道，眼神深邃，“也许有重要的情报。再说了，他如果想对你不利，早就直接动手了，何必这么大费周章？以他的实力，我们这里没有人拦得住。”\n\n林恩沉思片刻，最终点了点头。卡尔说的有道理，布莱克如果真的想对他不利，根本不需要用这种手段。\n\n“好吧，让他进来。”\n\n不一会儿，一个年轻人走进了房间。\n\n他看起来二十多岁，相貌英俊，气质儒雅，给人一种如沐春风的感觉。如果不是事先知道他的身份，林恩绝对想不到这个人会是夜语家族的强者。更让人惊讶的是，他身上散发出的气息，赫然已经达到八级血脉战士的境界！\n\n“林恩……”年轻人轻声道，声音温和，“好久不见……”\n\n“你是……”林恩看着这张熟悉又陌生的脸，“布莱克？”\n\n“是我。”布莱克微笑道，“一晃这么多年过去了，你都长这么大了……”\n\n林恩的心情变得复杂起来。\n\n他和布莱克，确实有过一段渊源。\n\n小时候，布莱克是唯一一个愿意和他玩的家族成员。虽然布莱克是养子，但林恩一直把他当成哥哥。那段岁月，是林恩童年唯一的温暖回忆。\n\n只是后来发生了那些事情，一切都变了。\n\n“你来做什么？”林恩的语气依然冰冷，但已经没有了一开始的那种敌意。\n\n“来看看你。”布莱克道，“顺便告诉你一些事情……”\n\n“什么事情？”\n\n“关于夜语家族的动向。”布莱克道，“还有——”\n\n布莱克顿了顿，看了一眼房间里的其他人。\n\n林恩会意，对泰勒等人道：“你们先出去一下。”\n\n“这……”泰勒有些犹豫。\n\n“没事的。”林恩道，“他如果想对我不利，早就动手了。以他的实力，我们这里没有人拦得住。”\n\n众人离开后，房间里只剩下林恩和布莱克。\n\n“现在可以说了吧？”林恩道。\n\n“林恩，”布莱克的表情变得严肃起来，“你知不知道，你现在的处境非常危险……”\n\n（本章完）"},
{"n":61,"t":"第六十一章：布莱克","c":"第二天，银火学派，会客房。\n\n按照约定，林恩来到了学派的一间会客房。这里是专门用来接待贵宾的地方，布置得十分雅致。红木家具、古董摆设、墙上挂着几幅名贵的魔法画作，整个房间充满了浓厚的学术气息。窗外是一棵巨大的银月古树，据说已经有上千年的历史，是银火学派的标志性景观。\n\n布莱克已经在那里等他了。\n\n“坐吧。”布莱克指着旁边的座位道。\n\n林恩坐下，看着布莱克，心情有些复杂。眼前的布莱克，已经不再是记忆中那个陪他玩耍的少年了。现在的他，是夜语家族的顶尖强者，是站在银月公国金字塔顶端的人物。而自己，却是被家族驱逐的落魄子弟。\n\n“你真的是夜语家族的人？”林恩开门见山地道。他需要更多的确认，因为布莱克的出现打破了他所有的计划。\n\n“是，也不是。”布莱克苦笑道，那笑容中带着几分苦涩和无奈，“我是个孤儿，刚出生就被夜语家族的家主收养的。从小在家族长大，接受家族的教育，学习的也是夜语家族的血脉传承功法。但我始终是一个养子，一个没有血缘关系的外人。”\n\n“那你今天来，是代表夜语家族来对付我的？”林恩的语气变得冰冷，周身的气息也开始涌动。如果布莱克敢动手，他就算明知不是对手，也会拼死一搏。\n\n“不。”布莱克摇头道，“我今天来，是代表我自己。”\n\n“代表你自己？”林恩一怔，“什么意思？”\n\n“林恩，”布莱克深吸一口气，看着林恩的眼睛，认真地道，“我今天来，是想告诉你一些事情。一些关于你母亲的事情。”\n\n林恩的身体猛地一僵。\n\n母亲……\n\n这个词，是他心中永远的痛。他从小就没有见过母亲，一直以为母亲是抛弃了他和父亲。但随着年龄的增长，他逐渐发现事情并没有那么简单。\n\n“你知道什么？”林恩的声音有些颤抖。\n\n“很多。”布莱克道，“这些年来，我一直在暗中调查。今天来，就是想把真相告诉你。”\n\n“什么真相？”\n\n“关于你的身世。”布莱克道，“还有，夜语家族的真正面目。”\n\n林恩沉默了片刻，最终点了点头：“好，我听你说。”\n\n布莱克站起身，走到窗边，看着窗外的景色，陷入了回忆。\n\n“你的父亲，是夜语家族的家主——夜语·星辰。”布莱克缓缓地道，“他是一个天才，二十五岁就突破到了九级血脉战士，是夜语家族几百年来最强大的家主。”\n\n“九级……”林恩喃喃道，那可是站在符文大陆顶端的存在！\n\n“对，九级。”布莱克道，“但他也是一个悲剧的人。他和你母亲相爱，但因为你母亲的身份低微，这段感情遭到了家族的强烈反对。”\n\n“身份低微？”林恩皱眉道，“我母亲是什么身份？”\n\n“具体我不清楚。”布莱克道，“但据我调查，你母亲似乎出身于一个神秘的部落，那个部落崇拜死神，世代传承着死神的力量。”\n\n林恩愣住了。\n\n死神……\n\n没想到，母亲竟然和死神传承还有渊源。\n\n“后来呢？”林恩急切地道。\n\n“后来，家主被迫娶了现在的妻子，也就是夜语家族的主母——银月公国皇室的一位公主。”布莱克道，“而你的母亲，被家族强行送离了银月城。等到家主找到她的时候，她已经……”\n\n“已经怎么了？”林恩的声音都在颤抖。\n\n“已经死了。”布莱克道，“具体怎么死的，我还没查到全部真相。但可以肯定的是，这其中有主母的影子。”\n\n林恩握紧拳头，指甲深深陷入了肉里。\n\n愤怒！\n\n无尽的愤怒！\n\n他一直以为母亲是抛弃了他和父亲，但现在看来，母亲很可能是被夜语家族的主母害死的！\n\n“那我呢？”林恩艰难地道，“我为什么会在夜语家族长大？”\n\n“因为家主。”布莱克道，“他在你母亲死后，找到了你——那时候你才刚刚出生。家主偷偷把你养在家族中，对外宣称你是某个旁系子弟的儿子。但纸包不住火，主母最终还是发现了你的存在。”\n\n“所以我就被驱逐了？”林恩自嘲地道，心中充满了苦涩。\n\n“对。”布莱克道，“主母容不下你，家主也没有办法正面违抗主母背后的皇室势力。所以，他只能偷偷让人把你送出银月城希望你能够在外面平安长大。”\n\n“所以，他一直知道我的存在？”林恩的声音有些哽咽。原来，父亲一直都知道他的存在，却从未露面。\n\n“知道。”布莱克道，“而且，他一直在暗中关注你。每次你遇到危险的时候，帮你化解的人，很多都是他安排的。”\n\n林恩沉默了。\n\n他从来没有想过，事情的真相竟然是这样。\n\n他的父亲，竟然一直在暗中守护着他……\n\n“你今天来，就是告诉我这些？”林恩道，心中的情绪复杂难明。\n\n“不只是这样。”布莱克的表情变得严肃起来，“我还有更重要的事情要告诉你。”\n\n“什么事情？”\n\n“关于你的敌人。”\n\n“我的敌人？”\n\n“夜语家族只是小菜。”布莱克道，声音变得低沉，“真正的大敌，是黄晖教团。”\n\n“黄晖教团……”林恩喃喃道，“那到底是什么组织？”\n\n“黄晖教团，”布莱克深吸一口气，“是这个世界上最神秘、最强大的组织之一。”\n\n他转过身，看着林恩，眼神深邃。\n\n“黄晖教团的历史可以追溯到几千年前。那时候，死神还没有陨落，黄晖教团就已经存在了。他们崇拜死神，妄图通过各种仪式来获取死神的力量。”布莱克道，“传说中，黄晖教团的创始者曾经得到过死神的一缕残魂，从而获得了部分死神的力量。这也是为什么他们对死神传承如此执着的原因。”\n\n“死神传承会威胁到他们的地位？”林恩若有所思地道。\n\n“不仅仅是地位问题。”布莱克道，“死神传承是死神力量的延续。如果有人继承了完整的死神传承，就有可能成为新一代的死神。到时候，黄晖教团数千年的布局就会付诸东流，他们所崇拜的‘死神’也会被取代。”\n\n“所以他们必须除掉我？”林恩道。\n\n“对。”布莱克点了点头，“而且，他们一旦发现你继承了死神传承，就一定会倾尽全力来击杀你。据我所知，黄晖教团中有不少九级强者，甚至传说还有半神级别的存在。”\n\n林恩沉默了。\n\n九级强者……\n\n那可是站在符文大陆顶端的存在！\n\n至于半神，那更是传说中的存在，据说整个符文大陆也没有几个。\n\n而他，现在只是一个五级血脉战士。中间的差距，宛如天堑。\n\n“你为什么要告诉我这些？”林恩问道，“如果我被黄晖教团杀掉，对夜语家族来说不是更好吗？他们就可以不用脏手，得到死神传承了。”\n\n“因为……”布莱克看着林恩，眼神变得复杂起来，“因为我不希望你有事。”\n\n“为什么？”林恩道，“我和你之间并没有血缘关系……”\n\n“但我们之间的羁绊是真的。”布莱克道，声音中带着一丝温暖，“小时候，只有我愿意陪你玩。只有我愿意保护你。这份感情，我不会忘记。”\n\n他顿了顿，继续说道：“而且，我欠你一个人情。”\n\n“人情？”林恩一怔。\n\n“对。”布莱克苦笑道，“当年你被驱逐的时候，主母曾经想让我一起去死。那一次，我差一点就死了。如果不是你母亲留下的玉佩救了我，我现在已经不在人世了。”\n\n“母亲留下的玉佩？”林恩愣住了。\n\n“那时候我还小，不懂事。”布莱克道，“但我一直记得，是你的母亲救了我一命。所以，我一定要保护你。”\n\n林恩看着布莱克，心中涌起一股暖意。\n\n也许，这个世界上还是有真正关心他的人。\n\n“谢谢你，布莱克。”林恩真诚地道。\n\n“不用谢。”布莱克道，“我们是兄弟，不是吗？”\n\n“对。”林恩道，“我们是兄弟。”\n\n两人相视一笑，多年的隔阂在这一刻烟消云散。\n\n“对了，”林恩想起一事，“你昨天说小心罗恩，是什么意思？”\n\n“罗恩是主母的侄子。”布莱克道，“他这次在银火城吃了这么大的亏，以他的性格，绝对不会善罢甘休。而且他是主母的心腹，主母一直把他当成继承人来培养。”\n\n“可我打断了他一条手臂，他还能怎么样？”林恩道。\n\n“以罗恩的性格，他一定会想尽办法报复你。”布莱克道，“而且，他最近正在闭关修炼，似乎在准备什么杀手锏。据我安插在罗恩身边的眼线报告，他似乎在修炼一种禁术，代价极大但威力惊人。”\n\n“杀手锏？”林恩皱眉道，“什么样的杀手锏？”\n\n“不清楚。”布莱克道，“但据我所知，罗恩手中握有一张神秘的底牌。这张底牌足以威胁到七级强者，甚至有可能击杀八级强者。”\n\n“八级？！”林恩变色道。\n\n“对。”布莱克道，“所以，你最近一定要小心。尽量不要离开银火学派，有莫雷导师的保护，罗恩就算再有手段也翻不起什么浪花。”\n\n林恩沉思片刻，最终点了点头。\n\n“我知道了。”\n\n“还有，”布莱克又道，“关于死亡沼泽的事情，你们真的决定要去？”\n\n“对。”林恩道，“我们打算去那里寻找变强的机遇。如果不变得更强，留在银火城也只有等死。夜语家族不会放过我，黄晖教团也不会放过我，只有变得更强，我才能保护自己想要保护的人。”\n\n布莱克沉默了。\n\n他知道林恩说的是事实。\n\n夜语家族不会放过他，黄晖教团也不会放过他。如果不能尽快变强，等待他的只有死亡。\n\n“死亡沼泽确实蕴含着巨大的机遇。”布莱克沉声道，“相传，那里是冥界与人界的交界处，蕴含着极其强大的死亡之力。如果能够活着从沼泽深处走出来，实力会有质的飞跃。”\n\n“你去过？”林恩问道。\n\n“没有。”布莱克摇头道，“但我听说过。那里面危机四伏，九死一生。即使是九级强者，也未必能够活着出来。”\n\n“我们已经做好心理准备了。”林恩坚定地道。\n\n布莱克看着林恩，突然笑了。\n\n“果然是你的性格。”布莱克道，“和小时候一模一样，永远不服输。永远充满了斗志。”\n\n“你不也一样？”林恩道，“你今天能来告诉我这些，就说明你从来没有变过。”\n\n布莱克愣住了。\n\n多久了？\n\n已经多久没有人叫过他“哥哥”了？\n\n自从进入夜语家族的核心圈子，他就必须时刻保持谨慎，不能暴露自己的真实情绪。因为在这个勾心斗角的家族里，任何软弱都可能被敌人利用。他必须时刻戴着面具活着，扮演一个冷酷无情的夜语家族继承者。\n\n但现在，在林恩面前，他可以卸下所有的伪装。\n\n“林恩……”布莱克的声音有些哽咽。\n\n“什么都别说了。”林恩道，“我都明白。你在夜语家族也不容易，要时刻防备着主母的暗算。”\n\n布莱克深吸一口气，平复了一下情绪。\n\n“对了，”布莱克想起一事，“我还有一件礼物要给你。”\n\n“什么礼物？”\n\n布莱克从储物袋中取出一张卷轴，递给林恩。\n\n“这是死亡沼泽的详细地图。”布莱克道，“上面标注了所有的危险区域和安全路径，还有一些强大魔兽的领地。你们拿着它，可以减少很多不必要的麻烦。”\n\n林恩接过地图，心中感动不已。\n\n“布莱克……”\n\n“不用说了。”布莱克道，“我们是兄弟，不是吗？”\n\n“对。”林恩道，“我们是兄弟。”\n\n两人相视一笑，一切尽在不言中。\n\n“还有一件事，”布莱克的表情变得有些犹豫，“我……”\n\n“怎么了？”林恩问道。\n\n“我想……”布莱克咬了咬牙，“我想跟你们一起去死亡沼泽。”\n\n林恩愣住了：“你要跟我们一起去？！”\n\n“对。”布莱克道，“我现在的实力是八级血脉战士巅峰，应该能够帮到你们。而且——”\n\n他顿了顿，继续说道：“而且，我正好可以借此机会离开夜语家族一段时间。主母已经在怀疑我暗中帮你了，如果我不离开，反而会引起她的怀疑。倒不如借此机会离开银月城，等风波过去再回去。”\n\n林恩沉思片刻，最终点了点头。\n\n“好吧。”\n\n“谢谢你，林恩。”布莱克道，“我会用我的生命来保护你。”\n\n“我们是兄弟，说这些做什么？”林恩道，“以后就是并肩作战的伙伴了！”\n\n布莱克笑了。\n\n那笑容发自内心，已经是他多少年没有露出过的真心微笑了。在夜语家族，他必须时刻保持冷漠和严肃，因为没有人知道，主母的爪牙随时都在暗中盯着他。\n\n但现在，在林恩面前，他终于可以卸下所有的防备。\n\n“对了，”布莱克突然想起一事，“你们打算什么时候出发？”\n\n“大概一个月后。”林恩道，“我们还需要做一些准备。而且我打算在出发前，尽可能提升一些实力。”\n\n“一个月……”布莱克沉思道，“够用了。这段时间我会留在银火城，暗中保护你们。等出发的时候，我们一起行动。”\n\n“好。”\n\n接下来的几天，布莱克正式在银火学派住了下来。\n\n他的身份是林恩的远房表弟，来银火学派求学。这个身份虽然有些牵强，但也没有引起太多怀疑。毕竟银火学派是银火公国最好的魔法学院，每年都会有很多贵族子弟前来求学。而且有莫雷导师的默许，谁也不会多问什么。\n\n而林恩，则利用这段时间，继续修炼，争取在出发前将实力提升到五级中期。血脉战士的五级是一个重要的分水岭。进入五级之后，血脉之力会产生质变，战斗力会大幅提升。\n\n林恩现在虽然是五级初期，但战斗力已经可以与六级血脉战士抗衡。如果算上暗影魔法和死神传承，他的真实实力甚至可以挑战七级！\n\n时间一天天过去，林恩的实力也在稳步提升。\n\n而在这段时间里，布莱克也没有闲着。他暗中调查了罗恩的动向，发现罗恩确实在准备什么阴谋。\n\n“林恩，我查到了一些消息。”这天，布莱克找到了林恩。\n\n“什么消息？”\n\n“罗恩最近在接触一个神秘的组织。”布莱克低声道，“这个组织叫做‘暗影议会’，专门从事暗杀活动，据说曾经成功刺杀过九级强者！”\n\n“什么？！”林恩变色道，“罗恩疯了吗？居然敢接触这种组织？”\n\n“狗急跳墙呗。”布莱克冷笑道，“他断了一条手臂，实力大损。想要报复你，只能借助外力。而且据我估计，暗影议会开出的代价一定非常高昂，罗恩这是在孤注一掷。”\n\n“那怎么办？”\n\n“不用担心。”布莱克道，“我已经安排人暗中盯着罗恩了。一旦他有任何异动，我会第一时间知道。而且，银火学派不是他能够撒野的地方，有莫雷导师在，他翻不起什么浪花。”\n\n林恩沉默了。\n\n他没想到罗恩竟然会做到这种地步。为了对付他，竟然不惜代价联系暗杀组织。\n\n“谢谢你，布莱克。”林恩真诚地道。\n\n“谢什么？”布莱克道，“我们是兄弟。”\n\n日子一天天过去，离出发的时间越来越近了。\n\n银火学派的气氛也变得越来越紧张。所有弟子都在议论林恩和罗恩的那场战斗，都在猜测林恩的真实实力。\n\n而林恩，则是全身心地投入到修炼之中。他知道，未来的道路只会更加艰难。他必须变得更强，强到足以保护自己想要保护的人！\n\n这天，林恩正在宿舍修炼，突然收到了黛西的消息。\n\n“林恩，你来一下花园，我有事情要跟你说。”\n\n林恩来到花园，只见黛西正站在花丛中，似乎在想什么事情。\n\n清晨的花园笼罩在薄雾之中，各色花朵上还带着露珠，在阳光下闪烁着晶莹的光芒。黛西站在花丛中，长发披肩，白衣胜雪，美得如同画中走出的仙女。\n\n“黛西，你找我？”林恩走过去道。\n\n黛西回过头，看着林恩，眼神有些复杂。\n\n“林恩，”黛西轻声道，“我决定了，我要跟你们一起去死亡沼泽。”\n\n“什么？！”林恩变色道，“不行，那里太危险了！你现在的实力还不够——”\n\n“正因为危险，我才要跟你一起去。”黛西道打断了林恩的话，“我不想再留在后面为你担惊受怕了……每次你出去冒险的时候，我都在学院里提心吊胆，这种感觉太痛苦了……”\n\n“黛西……”\n\n“让我跟你一起去，好吗？”黛西哀求道，“我保证不会拖累你的！我现在已经突破到四级了，而且我的治愈术也已经修炼到了很高的境界，可以在战斗中帮到你！”\n\n林恩看着黛西，心中五味杂陈。\n\n他当然知道黛西对他的感情。\n\n从第一次见面开始，黛西就对他表现出了明显的好感。这段时间的相处，两人的感情也在不断升温。但现在的他，连自己的命运都无法掌控，又怎么能保证黛西的安全？\n\n“黛西，”林恩轻声道，声音温柔，“你真的想好了？死亡沼泽是九死一生的地方，就算我拼尽全力，也不一定能保证你的安全……如果出了什么事，我会后悔一辈子的。”\n\n“我想好了。”黛西坚定地道，“无论前方有多危险，我都要陪在你身边。而且，我相信你一定会保护我的。”\n\n林恩沉默良久，最终点了点头。\n\n“好吧。”\n\n黛西笑了，笑得如同春花般灿烂。\n\n“谢谢你，林恩。”\n\n“谢什么？”林恩道，“我们是伙伴，不是吗？”\n\n“对。”黛西道，“我们是伙伴，永远都是。”\n\n两人并肩站在花园中，看着朝阳一点点升起，金色的阳光洒在他们的身上，镀上了一层温暖的光晕。这就是最简单的幸福。\n\n而就在不远处的角落里，布莱克默默地看着这一切，脸上露出了一丝欣慰的笑容。\n\n“也许，”他喃喃道，“这就是命运的安排吧……”\n\n接下来的几天，队伍开始做最后的准备工作。\n\n卡尔负责采购物资，泰勒负责制定路线，林恩则和布莱克一起研究死亡沼泽的地图。而黛西，也开始积极修炼，希望能够在出发前提升一些实力。\n\n一切都在朝着好的方向发展。\n\n然而，就在他们准备出发的前夜，一个意外的消息打破了平静。\n\n“林恩，不好了！”泰勒急匆匆地跑过来，“罗恩来了！”\n\n“什么？！”林恩变色道，“他来了？在哪里？”\n\n“就在学派门口！”泰勒道，“他还带了不少人！”\n\n林恩和布莱克对视一眼，同时朝学派门口赶去。\n\n当他们赶到的时候，罗恩已经带着人闯入了学派。\n\n（本章完）"},
{"n":62,"t":"第62章：密谈","c":"银火城的夜晚，灯火阑珊。\n\n暮色笼罩着这座繁华的都市，远处传来酒馆里醉汉的喧闹声，街道两旁的灯笼在微风中轻轻摇曳，将橘红色的光芒洒落在青石板路上。空气中弥漫着烤肉和葡萄酒的香气，偶尔有马车驶过，蹄声在寂静的巷子里回荡。\n\n在一处偏僻的巷子里，两道身影相对而立。月光透过缝隙洒落下来，在地面上投下斑驳的影子。\n\n“布莱克，你带我来这里做什么？”林恩警惕地看着四周，“有什么话不能在学派里说？”\n\n布莱克的表情异常凝重，他左右看了看，确认没有人跟踪后，才压低声音道：“林恩，今晚的谈话，可能会颠覆你对夜语家族的认知。”\n\n林恩皱眉道：“什么意思？”\n\n“你先告诉我，”布莱克道，“你对夜语家族，了解多少？”\n\n“了解多少？”林恩冷笑一声，“那个家族抛弃了我和我母亲，任由我们自生自灭。这就是我了解的。”\n\n“不，你了解的只是表面。”布莱克摇头道，“真正的夜语家族，远比你想象的复杂。”\n\n林恩看着布莱克，心中涌起一丝不安。他从没有见过布莱克如此严肃的表情。\n\n“到底怎么回事？”林恩道，“你直说吧。”\n\n布莱克深吸一口气，道：“夜语家族内部，并非铁板一块。实际上，现在的家族，已经分裂成了两个派系。”\n\n“派系？”林恩一怔，“什么派系？”\n\n“一派是以你父亲埃文斯·夜语为首的主战派，”布莱克道，“另一派则是以主母瑟琳娜为首的投降派。”\n\n“投降派？”林恩变色道，“向谁投降？”\n\n“黑暗帝国。”\n\n四个字，如同惊雷一般在林恩脑海中炸响。\n\n“你说什么？！”林恩难以置信地道，“黑暗帝国？那个被诸神封印的黑暗帝国？！”\n\n“对。”布莱克道，“黑暗帝国并没有真正消亡，它们一直在暗中蛰伏，等待着重临大陆的机会。而夜语家族的主母瑟琳娜，实际上是黑暗帝国安插在银月公国的棋子。”\n\n林恩感觉自己的世界观被颠覆了。\n\n“这...这怎么可能...”林恩喃喃道，“夜语家族可是银月公国的古老贵族...”\n\n“正因为是古老贵族，才容易被渗透。”布莱克道，“黑暗帝国在数千年的蛰伏中，培养了无数间谍和代理人。瑟琳娜就是其中最成功的一个。”\n\n“那我父亲呢？”林恩急切地道，“他知不知道这些事情？”\n\n布莱克的表情变得复杂起来。\n\n“知道，”布莱克道，“但他...也很无奈。”\n\n“无奈？”林恩皱眉道，“他是一族之长，怎么会无奈？”\n\n“因为瑟琳娜背后的势力太强大了。”布莱克道，“她掌控了家族七成以上的高手，还与银月公国的皇室有着千丝万缕的联系。你父亲虽然是家主，但实际上已经被架空了。”\n\n林恩沉默了。\n\n他一直以为，自己的父亲是冷漠无情的抛家弃子之人。但现在看来，事实远比想象中复杂。\n\n“你的意思是...”林恩艰难地道，“我父亲他...其实是有苦衷的？”\n\n“苦衷？”布莱克苦笑一声，“岂止是苦衷。你父亲这些年来，一直在暗中保护你。”\n\n“保护我？”林恩一怔，“这怎么可能...”\n\n“怎么不可能？”布莱克道，“你被驱逐出家族，是你父亲暗中操作的。否则，以主母的性格，早就派人暗杀你了。”\n\n林恩的身体勐地一僵。\n\n“还有，”布莱克继续道，“你母亲的事情...你父亲也一直在调查。虽然还没有找到确凿的证据，但他已经怀疑到瑟琳娜头上了。”\n\n林恩感觉眼眶有些湿润。\n\n原来，这些年来，并不是只有他一个人在承受痛苦。他的父亲，也在暗中承受着一切。\n\n“那他为什么不来找我？”林恩的声音有些颤抖，“既然他一直在暗中保护我，为什么不来见我？”\n\n“因为不能。”布莱克道，“一旦他和你相认，瑟琳娜肯定会借题发挥，到那时候，不仅你会有危险，整个家族都可能陷入内乱。”\n\n林恩握紧拳头，指甲陷入了肉里。\n\n“那我母亲呢？”林恩道，“我母亲到底是怎么死的？”\n\n布莱克沉默了片刻，才道：“根据我调查到的线索，你母亲...很可能是被瑟琳娜害死的。”\n\n“什么？！”林恩的眼睛瞬间红了，一股热血直冲脑门。他的双手不受控制地颤抖起来，胸中的愤怒如同汹涌的浪潮，几乎要将他吞噬。母亲的音容笑貌在脑海中浮现——那个温柔的女子，那个会在他生病时整夜守候在床边的母亲，竟然是被人害死的？！\n\n“具体的手法我还不知道，”布莱克道，“但有一点可以肯定，瑟琳娜绝对脱不了干系。”\n\n林恩感觉一股热血直冲脑门。\n\n“林恩，你冷静一点。”布莱克按住林恩的肩膀，“现在不是冲动的时候。”\n\n“冷静？”林恩甩开布莱克的手，“杀母之仇，我能冷静？！”\n\n“我理解你的心情，”布莱克道，“但你要想想，以你现在的实力，能对付得了瑟琳娜吗？她是九级巅峰强者，身边还有黑暗帝国的高手保护。”\n\n林恩的身体勐地僵住了。\n\n是啊，以他现在的实力，连罗恩都差点对付不了，又怎么能对抗得了瑟琳娜？\n\n“那我该怎么办？”林恩的声音充满了无力感，“难道要我放过仇人？”\n\n“当然不是。”布莱克道，“我的意思是，你需要更忍耐心，等待时机成熟。”\n\n“时机？”林恩冷笑一声，“什么时候才算时机成熟？”\n\n“等你突破到七级，或者八级的时候。”布莱克道，“到那时候，你就有资格与夜语家族正面抗衡了。”\n\n林恩沉默了。\n\n他知道布莱克说得对，但心中这股恨意，又怎么能轻易消除？\n\n“对了，”布莱克突然想起一事，“罗恩的背后，可能不仅仅是夜语家族。”\n\n“什么意思？”林恩皱眉道。\n\n“根据我调查的情报，”布莱克道，“罗恩最近与一些神秘人来往密切。那些人的气息...很像是黑暗帝国的死士。”\n\n“黑暗帝国？”林恩变色道，“你的意思是，罗恩已经投靠了黑暗帝国？”\n\n“很可能。”布莱克道，“瑟琳娜是黑暗帝国的人，罗恩作为她的侄子，会投靠黑暗帝国也不奇怪。”\n\n林恩感觉头皮一阵发麻。\n\n如果罗恩真的投靠了黑暗帝国，那事情就变得更加复杂了。\n\n“林恩，你接下来的打算是什么？”布莱克道。\n\n“死亡沼泽。”林恩道，“我打算去那里探险，寻找变强的机会。”\n\n“死亡沼泽...”布莱克喃喃道，“确实，那里是绝佳的修炼场所。但你要小心，那里也很危险。”\n\n“我知道。”林恩道，“但如果不变得更强，留在银火城也只有等死。”\n\n布莱克沉默了片刻，道：“我和你一起去。”\n\n“什么？”林恩一怔，“你要跟我们一起去？！”\n\n“对。”布莱克道，“我对死亡沼泽比较熟悉，可以帮你们避开很多危险。”\n\n“这太危险了...”林恩道，“你毕竟是夜语家族的人，如果你跟我一起走...”\n\n“正因为我是夜语家族的人，才要跟你一起走。”布莱克打断他，眼神坚定，“留在那里，我只会成为他们的工具。跟你在一起，至少可以做我认为正确的事。”\n\n林恩看着布莱克，心中涌起一股暖意。这些年来，布莱克是少数几个真正关心他的人之一。在夜语家族的时候，其他人要么轻视他，要么害怕被他牵连，也只有布莱克肯和他这个被家族边缘化的人来往。\n\n“谢谢你，布莱克。”\n\n“谢什么？”布莱克笑了，“我们是兄弟，不是吗？”\n\n“对。”林恩道，“我们是兄弟。”\n\n两人相视一笑，多年的隔阂在这一刻彻底消散。\n\n“对了，”布莱克突然想起一事，“关于死亡沼泽，我还有一件重要的事情要告诉你。”\n\n“什么？”\n\n“死亡沼泽的深处，可能隐藏着黑暗帝国的秘密。”布莱克的表情变得严肃起来，“据我所知，黑暗帝国一直在寻找冥界入口。而死亡沼泽，很可能就是入口所在地。”\n\n林恩变色道：“你的意思是...”\n\n“如果我的猜测没错，”布莱克道，“死亡沼泽近期的异变，很可能就是黑暗帝国搞的鬼。”\n\n林恩感觉事情变得越来越复杂了。\n\n先是夜语家族的内部矛盾，然后是黑暗帝国的渗透，现在又扯上了冥界入口...\n\n“布莱克，”林恩深吸一口气，“你认为死亡沼泽里到底有什么？”\n\n“我不知道，”布莱克摇头道，“但可以肯定的是，那里一定隐藏着巨大的秘密。否则，黑暗帝国也不会花费那么多精力去研究它。”\n\n“那我们还要去吗？”林恩道。\n\n“要，当然要去。”布莱克道，“如果我们能先黑暗帝国一步找到冥界入口，就能阻止它们的阴谋。”\n\n“阻止黑暗帝国...”林恩苦笑一声，“我们这种实力...”\n\n“不试试怎么知道？”布莱克道，“而且，死亡沼泽对你来说，也是一个绝佳的修炼机会。如果你能在那里有所收获，实力将会突飞勐进。”\n\n林恩沉默了片刻，最终点了点头。\n\n“好吧，”林恩道，“我们一起去。”\n\n“这就对了。”布莱克道，“记住，到了死亡沼泽之后，一切小心。如果发现不对劲，立刻撤退。”\n\n“知道了。”林恩道。\n\n“还有，”布莱克犹豫了一下，还是道，“如果有机会的话...去见见你父亲吧。他这些年来，一直很想见你。”\n\n林恩没有回答，只是低着头，不知道在想什么。\n\n布莱克叹了口气，不再说什么。\n\n“时间不早了，”布莱克道，“我们该回去了。明天开始，要做好出发前的准备。”\n\n“好。”林恩道。\n\n两人一起离开了小巷。\n\n夜晚的银火城，灯火通明，热闹非凡。但林恩的心情，却异常沉重。\n\n今天晚上，他知道了太多秘密。夜语家族的内部矛盾，父亲的无奈与苦衷，母亲死亡的真相，罗恩投靠黑暗帝国，死亡沼泽隐藏的秘密...\n\n这一切，都让他感到压力山大。\n\n“也许，这就是命运吧。”林恩喃喃道，“既然无法逃避，那就勇敢面对。”\n\n他抬头看着星空，眼神变得坚定起来。\n\n夜空中繁星点点，如同无数双眼睛在注视着他。林恩不禁想到，母亲是否也在其中某个地方注视着他？泪水在眼眶中打转，但他强行忍住了。\n\n总有一天，他会变得足够强，揭开所有的真相，为母亲报仇，也为了保护自己在乎的人。\n\n至于夜语家族...\n\n林恩握紧拳头，眼中闪过一丝寒芒。\n\n该算的账，总是要算的。\n\n（本章完）"},
{"n":63,"t":"第63章：泰勒的危机","c":"深夜，银火学派的一间宿舍内。\n\n泰勒独自坐在床边，手中紧紧握着一封信。他的身体在微微颤抖，脸色苍白如纸。\n\n“不可能...这不可能...”\n\n泰勒的声音如同梦呓一般，不断重复着同样的话语。\n\n信是家乡的族人传来的，上面只有短短几行字：\n\n“泰勒少爷，风暴家族完了。夜语家族带人闯入了领地，见人就杀，无一活口。老爷和夫人...他们至死都没有屈服。少爷，快跑，永远不要再回来。”\n\n纸张在泰勒手中化为齑粉。\n\n“不——”\n\n一声怒吼，泰勒勐地站起身，一拳砸在墙壁上。\n\n“轰——”\n\n坚固的石墙竟然被这一拳砸出一个大洞，烟尘四溅。\n\n泰勒的眼睛血红一片，浑身的血管凸起，仿佛要炸裂一般。他的气息变得狂暴无比，周围的家具在这股气息的冲击下纷纷碎裂。\n\n“夜语家族！我要你们的命！”\n\n泰勒咆哮着，就要往外冲。\n\n“泰勒！”\n\n就在这是，卡尔从外面冲了进来，死死地抱住了泰勒。\n\n“放开我！”泰勒疯狂地挣扎着，“我要去杀了他们！为父母族人报仇！”\n\n“你冷静一点！”卡尔大声道，“你现在去就是送死！”\n\n“送死？！”泰勒勐地转过身，眼睛血红地瞪着卡尔，“那是我父母！那是我的族人！全部都死了！你让我怎么冷静？！”\n\n卡尔看着泰勒，心中一沉。\n\n他太了解自己这个堂弟了。泰勒表面上看起来温和，但实际上性格刚烈，睚眦必报。现在家族被灭，他肯定会失去理智。\n\n“泰勒，”卡尔按住泰勒的肩膀，强行让他冷静下来，“你听我说。”\n\n“说什么？！”泰勒怒吼道，“还有什么好说的？！”\n\n“说你去送死毫无意义！”卡尔大声道，“你死了，谁来给族人报仇？！”\n\n泰勒勐地僵住了。\n\n是啊，如果他也死了，谁来给族人报仇？\n\n看着泰勒冷静了一些，卡尔的态度也缓和下来。\n\n“泰勒，”卡尔轻声道，“我理解你的心情。但是，你必须冷静。”\n\n“冷静...”泰勒的声音充满了苦涩，“你要我怎么冷静...那是我的父母...那是看着我长大的族人...全部都没了...”\n\n眼泪，从泰勒的眼眶中滑落。\n\n男儿有泪不轻弹，只是未到伤心处。\n\n卡尔看着泰勒，心中也是一阵绞痛。\n\n他和泰勒，都是风暴家族的遗孤。三年前的那场变故，让他们被迫逃离家乡，流落到银火城。\n\n这些年来，泰勒一直希望有朝一日能够返回家乡，重建家族。但现在，这个希望彻底破灭了。\n\n“泰勒，”卡尔道，“你还记得我们当初离开家乡时说的话吗？”\n\n泰勒一怔。\n\n“我们说过，”卡尔继续道，“总有一天，我们要让夜语家族付出代价。我们要重建风暴家族，让那些害我们的人后悔。”\n\n“记得...”泰勒喃喃道。\n\n“那你现在在做什么？”卡尔道，“你这样冲动地去送死，能实现我们的目标吗？！”\n\n泰勒握紧拳头，指甲陷入了肉里。\n\n他当然知道，现在去夜语家族就是送死。\n\n但是，他咽不下这口气！\n\n“堂兄...”泰勒的声音充满了痛苦，“我该怎么办...我到底该怎么办...”\n\n“变强。”卡尔道，“只有变得足够强，才能给族人报仇。”\n\n“变强...”泰勒喃喃道。\n\n“对，”卡尔道，“林恩已经决定去死亡沼泽探险了。那里虽然危险，但如果能够活着出来，实力会提升很多。”\n\n“死亡沼泽...”泰勒犹豫道，“那里真的能让我变强吗？”\n\n“一定能。”卡尔道，“死亡沼泽是大陆上最危险的区域之一，但同时也是机遇最多的地方。那里有各种天材地宝，有强大的魔兽，还有传说中的冥界入口。如果我们能在那里有所收获，实力将会突飞勐进。”\n\n泰勒沉默了。\n\n他当然知道死亡沼泽的凶险。之前他也听说了不少探险者葬身沼泽的消息。但是，除了变强，他还有其他选择吗？\n\n“堂兄，”泰勒道，“就算我们变强了，能对抗整个夜语家族吗？”\n\n“不能。”卡尔诚实地道，“但至少，我们有了一战之力。”\n\n“然后呢？”泰勒道，“就算我们突破到七级、八级，能对抗九级巅峰的强者吗？”\n\n“不能。”卡尔依然诚实，“但我们可以发展自己的势力，结交更多的盟友。总有一天，我们会变得比夜语家族更强。”\n\n泰勒看着卡尔，突然笑了。\n\n“堂兄，你什么时候变得这么有哲理了？”\n\n“都是从你身上学的。”卡尔也笑了。\n\n兄弟两人相视一笑，心中的阴霾散去了一些。\n\n“对了，”卡尔想起一事，“把这件事情告诉林恩吧。”\n\n“为什么？”泰勒一怔。\n\n“因为我们是伙伴。”卡尔道，“林恩是我们的兄弟，他有权知道发生了什么。而且...”\n\n“而且什么？”\n\n“而且，林恩与夜语家族也有着深仇大恨。”卡尔道，“他的母亲，很可能也是被夜语家族害死的。”\n\n泰勒变色道：“你说什么？！”\n\n“我也是刚知道的。”卡尔道，“林恩的母亲，是被夜语家族的主母瑟琳娜害死的。”\n\n“这个仇，他一定会报的。”卡尔继续道，“所以，你们的目标是一致的。联合起来，你们的力量会更强。”\n\n泰勒沉默了片刻，点了点头。\n\n“好吧，”泰勒道，“明天我会告诉林恩。”\n\n“这就对了。”卡尔道，“记住今日的仇恨，但不要被仇恨蒙蔽了双眼。我们的目标是星辰大海，而不是眼前的苟且。”\n\n“我明白了。”泰勒道。\n\n两人又聊了一会儿，卡尔才离开。\n\n房间里只剩下泰勒一个人。\n\n他站在窗前，看着夜空中的星星，心中充满了悲凉。\n\n“父亲，母亲...”泰勒喃喃道，“孩儿不孝，无法保护你们...但是，我发誓，总有一天，我会让夜语家族血债血偿！”\n\n他握紧拳头，指甲陷入了肉里，鲜血顺着指缝滴落。\n\n但他仿佛感觉不到疼痛一般。\n\n仇恨的火焰，在心中燃烧。\n\n第二天清晨。\n\n林恩刚刚起床，就看到泰勒站在门口。\n\n“泰勒？”林恩皱眉道，“这么早来找我，有什么事吗？”\n\n“进来说吧。”泰勒道。\n\n两人走进房间，泰勒关上门，然后把昨晚的事情一五一十地告诉了林恩。\n\n林恩听完之后，沉默了良久。\n\n“泰勒...”林恩轻声道，“你没事吧？”\n\n“没事。”泰勒道，“只是需要时间消化。”\n\n林恩看着泰勒，心中感慨万千。\n\n这就是命运的可笑之处。他们这些人，或多或少都与夜语家族有着恩怨。\n\n林恩是被驱逐的私生子，母亲被主母害死。泰勒是家族被灭的遗孤，父母族人都被杀。\n\n也许，这就是他们必须变得强大的原因。\n\n“泰勒，”林恩道，“你放心。总有一天，我们会摧毁夜语家族，让那些害你的人付出代价。”\n\n“我相信你。”泰勒道。\n\n两人击掌为誓。\n\n接下来的几天，泰勒像是换了一个人一样，修炼比以往更加刻苦。\n\n每天天不亮，他就起床开始锻炼。白天，他跟随卡尔一起研究战术和武技。晚上，当其他人休息的时候，他还在月光下挥剑练习。\n\n他的实力本来就不错，现在更是突飞勐进。短短几天时间，就已经达到了五级血脉战士的中期。\n\n“还不够...”泰勒喃喃道，“我要变得更强...”\n\n而与此同时，死亡沼泽的准备工作也在紧锣密鼓地进行着。\n\n戈克利用自己的渠道，准备了大量的补给物资。卡尔则负责制定详细的路线图。黛西也没有闲着，她利用奥术法师的知识，制作了很多魔法道具。\n\n而林恩，则在继续稳固境界的同时，开始研究从遗迹中获得的亡灵魔法。\n\n时间一天天过去，离出发的日子越来越近了。\n\n这天，林恩正在宿舍修炼，突然收到了莫雷导师的传讯。\n\n“林恩，你来一下我的办公室。”\n\n林恩来到莫雷导师的办公室，发现布莱克也在。\n\n“导师，您找我？”林恩道。\n\n“坐吧。”莫雷导师道。\n\n林恩坐下后，莫雷导师的表情变得严肃起来。\n\n“我已经听说了，”莫雷导师道，“你们要去死亡沼泽探险。”\n\n“对。”林恩道，“我们打算后天出发。”\n\n“不行。”莫雷导师道，“你们不能去。”\n\n“为什么？”林恩一怔，“死亡沼泽虽然危险，但也是绝佳的修炼场所...”\n\n“没有但是。”莫雷导师打断他，“死亡沼泽是大陆上最危险的区域之一，即使是九级强者也未必能够全身而退。你们这种实力，去了就是送死。”\n\n“可我们...”林恩想要反驳。\n\n“没有可是。”莫雷导师道，“我不能让我的弟子去送死。”\n\n这时，布莱克开口了。\n\n“导师，”布莱克道，“让我跟着他们一起去吧。有我保护他们，应该不会有事。”\n\n莫雷导师看着布莱克，沉默了片刻。\n\n“你跟着去？”莫雷导师道，“你可是八级强者...”\n\n“八级强者也有陨落的可能。”布莱克道，“但是，我会用我的生命保护他们。”\n\n莫雷导师沉思良久，最终叹了口气。\n\n“好吧，”莫雷导师道，“但是，你们一定要记住我下面说的话。”\n\n“导师请讲。”林恩道。\n\n“第一，”莫雷导师道，“不要深入沼泽深处。死亡沼泽的外围虽然危险，但还能应付。但一旦进入深处，即使是九级强者也可能回不来。”\n\n“第二，”莫雷导师继续道，“小心黑暗帝国的人。我怀疑他们也在打死亡沼泽的主意。”\n\n林恩和布莱克对视一眼，都看到了对方眼中的惊讶。\n\n“导师，您知道黑暗帝国的事情？”林恩道。\n\n“我知道一些。”莫雷导师道，“黑暗帝国并没有真正消亡，它们一直在暗中蛰伏。现在，它们似乎在策划什么大阴谋。”\n\n“是什么阴谋？”林恩道。\n\n“我也不清楚，”莫雷导师道，“但可以肯定的是，死亡沼泽肯定是关键。”\n\n“弟子明白。”林恩道。\n\n“第三，”莫雷导师道，“如果发现不对劲，立刻撤退。记住，留得青山在，不怕没柴烧。”\n\n“知道了，导师。”林恩道。\n\n莫雷导师看着林恩，眼神变得柔和起来。\n\n“林恩，”莫雷导师道，“你是我最出色的学生。我不希望你出事。”\n\n“导师放心，”林恩道，“弟子一定会活着回来的。”\n\n“我相信你。”莫雷导师道。\n\n两人离开了办公室。\n\n第二天清晨，天刚蒙蒙亮。\n\n银火城的东门外，林恩、泰勒、卡尔、戈克、黛西，还有布莱克，一共六人，正在做最后的准备。\n\n“我们走吧。”林恩道。\n\n众人点头，离开了银火城。\n\n泰勒回头看了一眼银火城，眼神变得坚定起来。\n\n“夜语家族，”泰勒在心中暗暗发誓，“总有一天，我会回来的。那时候，就是你们的末日！”\n\n（本章完）"},
{"n":64,"t":"第64章：死亡沼泽","c":"银火城，暮色酒馆。\n\n夕阳的余晖透过破旧的窗棂洒进屋内，在木质桌椅上投下斑驳的光影。酒馆内人声鼎沸，佣兵们在角落低声交谈，分享着各自的情报和见闻。这是银火城最大的一间酒馆，也是消息最为流通的地方。\n\n卡尔独自坐在最里面的角落，手中握着一杯泛着泡沫的麦酒，却无心饮用。他的眉头紧锁，目光深邃地注视着酒杯，仿佛在思考着什么重要的事情。\n\n最近几天，他一直在调查死亡沼泽的情报。作为曾经的在佣兵界闯荡过的老手，他有着广泛的人脉和信息来源。二十年的佣兵生涯，让他结识了来自大陆各地的朋友，这些人脉在关键时刻发挥了巨大的作用。\n\n而调查的结果，让他感到震惊和不安。\n\n“死亡沼泽……”卡尔喃喃道，手指无意识地敲击着酒杯边缘。\n\n根据他得到的情报，死亡沼泽确实出现了异变。而且，这次异变与那个传说中的黑暗帝国有关。\n\n“黑暗帝国……那些疯子……”卡尔握紧酒杯，指节泛白，“他们到底想做什么？”\n\n黑暗帝国，这是一个在大陆上被列为禁忌的名字。相传在一千年前，黑暗帝国曾经统治了大半个大陆，他们崇拜死神，妄图打开冥界入口，获得死神的力量。最终，在各大种族联合反击下，黑暗帝国土崩瓦解，残余势力退入了蛮荒之地，从此销声匿迹。\n\n但卡尔知道，黑暗帝国从未真正消失。他们一直在暗中积蓄力量，等待着卷土重来的机会。\n\n就在这时，一个人坐到了他的对面。\n\n“卡尔，在想什么呢？”\n\n卡尔抬头看去，原来是林恩。\n\n今天的林恩穿着一件简单的灰色长袍，看起来就像一个普通的年轻学者。但卡尔知道，这个年轻人的身体里蕴含着多么强大的力量。\n\n“没什么。”卡尔道，“只是在想一些事情。”\n\n“是关于死亡沼泽的吗？”林恩开门见山地道。他敏锐地察觉到，这几天卡尔一直在忙碌着什么，有时候甚至几天不见人影。\n\n卡尔犹豫了一下，点了点头。\n\n“对。”卡尔道，“我查到了一些很重要的情报。”\n\n“什么情报？”林恩问道。他可不会天真的认为，卡尔这些天的忙碌只是为了游玩。\n\n卡尔左右看了看，确认没有人注意这边后，压低声音道：“死亡沼泽的异变，是黑暗帝国搞的鬼。”\n\n“什么？！”林恩变色道。黑暗帝国这个名字，即使是他也有所耳闻。那是一个曾经给整个大陆带来灾难的恐怖势力。\n\n“嘘！”卡尔做了个噤声的手势，“小声点！这种消息如果传出去，会引起恐慌的！”\n\n林恩会意地压低声音：“到底是怎么回事？”\n\n“我调查了很久，”卡尔道，声音低沉，“终于发现了一些线索。黑暗帝国一直在研究如何打开冥界入口，而死亡沼泽，就是他们选中的地方。”\n\n“冥界入口……”林恩喃喃道，“那不是传说中的存在吗？”\n\n“传说？”卡尔冷笑一声，“也许吧。但黑暗帝国的人可不这么认为。他们坚信，只要能够打开冥界入口，就能获得死神的力量。”\n\n“然后呢？”\n\n“然后统治整个世界。”卡尔道，“这就是黑暗帝国的野心。一千年前他们失败了，但现在，他们似乎找到了新的方法。”\n\n林恩沉默了。\n\n他继承的是死神传承，对于死神的力量再清楚不过。那种力量，确实足以颠覆整个世界。如果让黑暗帝国成功了，后果不堪设想。\n\n“如果让黑暗帝国成功了……”林恩道。\n\n“后果不堪设想。”卡尔道，“所以，我们必须阻止他们。”\n\n“你有几成把握？”\n\n卡尔想了想，道：“如果只是我们几个人，最多三成。但如果能够联合其他势力……”\n\n“联合其他势力？”\n\n“对。”卡尔道，“比如，银火学派。比如，其他反对黑暗帝国的势力。据我所知，银火学派的高层一直在暗中调查黑暗帝国的动向，如果我们能够提供这个情报，或许能够得到学派的支援。”\n\n林恩沉思片刻，点了点头。\n\n“这件事情，需要从长计议。”林恩道，“等我们到了死亡沼泽，了解了具体情况再说。”\n\n“好。”卡尔道，“不过，林恩……”\n\n“什么？”\n\n“你要做好心理准备。”卡尔的表情变得凝重起来，“死亡沼泽比你想象的要危险得多。”\n\n“我知道。”林恩道。对于死亡沼泽的凶险，他也有所耳闻。那是大陆上最危险的禁地之一，无数探险者有去无回。\n\n“不，你不知道。”卡尔道，“我年轻的时候，曾经去过一次死亡沼泽。”\n\n“什么？！”林恩变色道，“你进去过？！”\n\n“对。”卡尔道，眼神中闪过一丝追忆，“那是我做佣兵的时候，接了一个护卫任务，保护一个探险队进入死亡沼泽寻找宝物。”\n\n“然后呢？”\n\n“那支探险队有十二个人，”卡尔的声音变得低沉，仿佛在回忆那些不堪的往事，“活着出来的，只有三个。”\n\n“三个……”林恩喃喃道。这意味着，十二个人中有九个人永远留在了那个地方。\n\n“死亡沼泽中有大量的亡灵生物，”卡尔道，“那些家伙不知道疼痛，不知道恐惧，只会不停地攻击入侵者。而且，等级越高的亡灵生物，越难对付。”\n\n“有九级亡灵吗？”\n\n“有。”卡尔道，“我曾经亲眼看到过一只九级的骨龙。那种存在，足以秒杀任何八级以下的强者。”\n\n林恩沉默了。\n\n九级骨龙，那可是相当于法圣级别的存在！即使是现在的他，遇到九级骨龙也只有逃跑的份。\n\n“现在你还想去吗？”卡尔问道。\n\n林恩沉默了良久，最终笑了。\n\n“去，为什么不去？”林恩道，“风险与机遇并存。如果我因为害怕危险而止步不前，永远也无法变强。”\n\n“好！”卡尔赞叹道，“有胆识！”\n\n“而且，”林恩继续道，“如果黑暗帝国真的在打死亡沼泽的主意，我就更要去看看了。”\n\n“为什么？”\n\n“因为死神传承。”林恩道，“如果他们真的想打开冥界入口，那么我身上的力量，可能是阻止他们的关键。”\n\n卡尔看着林恩，突然笑了。\n\n“林恩，你真的成长起来了。”\n\n“我只是做了我认为对的事情。”林恩道。\n\n就在这时，酒馆的门被推开，一个风尘仆仆的中年男子走进了进来。\n\n“卡尔！”中年男子看到卡尔，眼睛一亮，大步走了过来，“可算找到你了！”\n\n卡尔抬头看去，发现是自己的老朋友——杰夫，一个经常在各地跑的商人。\n\n“杰夫？”卡尔道，“你怎么来了？”\n\n“当然是给你送情报来了。”杰夫左右看看，压低声音道，“我刚从死亡沼泽那边回来，你想知道的消息，我都知道。”\n\n卡尔精神一振：“快说说！”\n\n杰夫坐下来，要了一杯麦酒，一饮而尽，然后才开始讲述。\n\n“死亡沼泽的异变，确实是黑暗帝国搞的鬼。”杰夫道，“他们在一个叫做'冥渊'的地方，建立了一个巨大的祭坛，试图打开冥界入口。”\n\n“冥渊？”卡尔皱眉道，“那是什么地方？”\n\n“那是死亡沼泽的最深处，”杰夫道，“传说中，那里是距离冥界最近的地方。黑暗帝国的人已经在那里活动了半年多，最近终于有了进展。”\n\n“什么进展？”\n\n“我听说，他们已经找到了打开冥界入口的方法。”杰夫道，“只要再过一段时间，冥界入口就能够彻底打开。”\n\n卡尔和林恩对视一眼，都看到了彼此眼中的震惊。\n\n“就没有办法阻止他们吗？”林恩问道。\n\n“有。”杰夫道，“但是，需要很强的实力。据我所知，黑暗帝国在冥渊部署了大量的高手，至少有三位九级强者坐镇。”\n\n“三位九级……”卡尔倒吸一口凉气。那可是相当于三位法圣级别的存在！\n\n“而且，”杰夫继续道，“冥界入口一旦打开，会有大量的亡灵生物从里面涌出来。到时候，整个大陆都会陷入灾难。”\n\n林恩握紧拳头。\n\n他身上继承的是死神传承，绝对不能让黑暗帝国的阴谋得逞。\n\n“杰夫，”卡尔道，“你愿意把这个情报卖给银火学派吗？我可以给你一个满意的价格。”\n\n杰夫犹豫了一下，点了点头。\n\n“好吧，”杰夫道，“但是，你们要小心。黑暗帝国的人已经在沼泽外围布下了眼线，任何靠近死亡沼泽的可疑人员都会被他们监视。”\n\n“知道了。”卡尔道，“谢谢你，杰夫。”\n\n“不客气。”杰夫道，“祝你们好运。”\n\n杰夫离开后，卡尔和林恩陷入了沉默。\n\n“看来，这次死亡沼泽之行，比我想象的还要危险。”卡尔苦笑道。\n\n“但是，”林恩道，“如果能够阻止黑暗帝国的阴谋，那就是大功一件。而且……”\n\n“而且什么？”\n\n“而且，我有一种感觉。”林恩道，“死亡沼泽中，有我需要的东西。”\n\n“需要的东西？”\n\n“对。”林恩道，“死神传承告诉我，那里有机遇。”\n\n卡尔看着林恩，突然笑了。\n\n“你这个家伙，真是越来越神秘了。”\n\n“以后你会知道的。”林恩也笑了。\n\n接下来的几天，众人继续做准备。\n\n而关于死亡沼泽的情报，也越来越详细。\n\n根据卡尔收集的情报，死亡沼泽的异变始于三个月前。\n\n一开始，只是沼泽中的亡灵生物变得活跃起来。后来，越来越多的探险者进入沼泽探险，但都是有去无回。\n\n直到一个月前，有人发现沼泽的深处出现了一道巨大的黑色光柱，直冲云霄。\n\n“那道光柱，很可能就是冥界入口的征兆。”卡尔分析道，“如果光柱彻底成型，冥界入口就会打开。”\n\n“我们还有多少时间？”林恩问道。\n\n“不确定。”卡尔道，“可能几天，可能几周，也可能几个月。但有一点可以肯定，时间不多了。”\n\n林恩沉思片刻，道：“那我们要加快速度了。”\n\n“好。”卡尔道，“我已经制定好了路线。按照这条路线，我们可以最快抵达死亡沼泽的中心区域。”\n\n“很好。”林恩道，“通知大家，明天出发。”\n\n“好！”\n\n第二天清晨，众人再次集合。\n\n除了林恩、泰勒、卡尔、戈克、黛西、布莱克六人之外，还有几个学派的导师级人物。\n\n他们是被莫雷导师派来保护林恩的，虽然名义上是随行，但实际作用是监督和支援。\n\n“人都到齐了吧？”林恩环顾四周。\n\n“到齐了。”卡尔道。\n\n看着眼前的众人，林恩心中涌起一股暖意。这些人，都是他最信任的伙伴和朋友。他们愿意跟着他一起去闯那九死一生的险地，这份情谊，他永远也不会忘记。\n\n“出发！”\n\n一行人离开了银火城，踏上了前往死亡沼泽的道路。\n\n接下来的几天，众人日夜兼程。\n\n为了赶时间，他们甚至没有在城镇中休息，只是在野外露营。一路上，卡尔不断地向众人讲述着死亡沼泽的情况，让大家对那个地方有更多的了解。\n\n“死亡沼泽位于银月公国的西北部，面积大约有十万平方公里。”卡尔骑在马上说道，“那里原本是一片原始森林，但在两千年前的一次大战中，无数强者在那里陨落，强大的死亡能量将那片森林变成了沼泽。”\n\n“两千年……”泰勒喃喃道，“那么，那里已经存在了两千年？”\n\n“对。”卡尔道，“这两千年来，死亡沼泽一直在缓慢地扩张。越来越多的死亡能量汇聚在那里，形成了现在的规模。”\n\n“那为什么没有人彻底清除那里？”黛西问道。\n\n“因为做不到。”卡尔摇头道，“死亡沼泽的中心区域，能量浓度太高了。即便是法圣级别的强者，也很难在那里长期生存。而且，那里还有大量的高阶亡灵生物盘踞.”\n\n“对了，”卡尔似乎想起了什么，“你们知道吗？死亡沼泽虽然危险，但也是大陆上机遇最多的地方之一。”\n\n“机遇？”戈克眼睛一亮，“什么机遇？”\n\n“传说，”卡尔道，“死亡沼泽是死神陨落的地方。在那片沼泽的深处，隐藏着死神留下的宝藏。”\n\n“死神宝藏？”林恩心中一动。他继承的是死神传承，如果死亡沼泽中真的有死神留下的东西，那对他来说无疑是天大的机遇。\n\n“对。”卡尔道，“传说中，死神在陨落之前，将自己的一部分力量和宝物留在了死亡沼泽。这些年来，不知道有多少探险者进入死亡沼泽就是为了寻找传说中的死神宝藏。”\n\n“有人找到过吗？”泰勒问道。\n\n“据说有。”卡尔道，“但具体是什么，没有人知道。因为那些找到宝藏的人，要么死了，要么消失了，再也没有出现在大陆上。”\n\n众人一路交谈着，对死亡沼泽的了解也越来越深。\n\n终于，在第五天傍晚，众人抵达了死亡沼泽的边缘。\n\n“好浓重的死亡气息……”黛西皱着眉头道。\n\n确实，刚靠近沼泽，就能感觉到一股阴冷的气息扑面而来，让人很不舒服。那种气息，仿佛能够渗透进骨髓，让人由内而外地感到寒冷。\n\n而且，越往里走，这种感觉就越强烈。\n\n“大家小心。”卡尔提醒道，“从现在开始，我们已经进入危险区域了。”\n\n众人点头，纷纷握紧武器。\n\n夜幕降临，死亡沼泽显得格外阴森。\n\n各种奇怪的声音从沼泽深处传来，有尖锐的啸叫，有低沉的咆哮，还有模煳不清的吟唱声。这些声音交织在一起，让人毛骨悚然。\n\n“我们今晚在这里扎营。”卡尔指着一块相对干燥的高地，“明天再继续前进。”\n\n众人开始安营扎寨。\n\n林恩独自站在营地的边缘，看着远处的沼泽。\n\n黑暗笼罩着一切，什么都看不清。\n\n但林恩能感觉到，在那黑暗之中，有某种东西在召唤他。那种召唤若有若无，却真实存在。\n\n“那是……”林恩喃喃道，“死神的力量……”\n\n看来，死亡沼泽真的与死神有关。也许，他真的能够在这里找到属于自己的机遇。\n\n这一夜，林恩失眠了。\n\n他躺在帐篷里，脑海中不断地回想着这些天发生的事情。黑暗帝国、死亡沼泽、冥界入口……这些名词不断地在他脑海中盘旋。\n\n还有泰勒的仇恨。\n\n林恩知道，泰勒一直想要找夜语家族报仇。但现在的他们，还没有那个实力。\n\n“如果能够在死亡沼泽中有所收获……”林恩心中暗道，“也许，我就能变得更强……”\n\n想着想着，林恩终于沉沉睡去。\n\n第二天清晨，众人继续前进。\n\n而他们不知道的是，在沼泽的深处，有一双眼睛正在注视着他们。\n\n“林恩·夜语……你终于来了……”\n\n（本章完）"},
{"n":65,"t":"第65章：新的冒险","c":"银火学派，会议室。\n\n清晨的阳光透过高大的窗户洒进屋内，在木质地板上投下温暖的光斑。室内摆放着一张巨大的椭圆形会议桌，周围坐着林恩、泰勒、卡尔、戈克、黛西五人。莫雷导师站在首位，表情严肃而关切。\n\n今天是出发的日子，也是众人最后准备的机会。\n\n“准备好了吗？”莫雷导师问道，目光逐一扫过在场每个人的脸庞。\n\n“准备好了。”林恩代表众人回答道。他的声音坚定有力，展现出一种经过了深思熟虑后的从容。\n\n莫雷导师点点头，眉头微微皱起。死亡沼泽的凶险，不用他说大家也清楚。这次探险，说是九死一生也不为过。\n\n“你们确定要去？”莫雷导师又问了一遍，语气中带着一丝最后的期待。他多么希望这些年轻人能够改变主意，留在相对安全的学派中修炼。\n\n“确定。”林恩道，“我们没有退路了。”\n\n是的，没有退路。泰勒的家族被灭，他必须变强才能为族人报仇。林恩自己也需要变得更强，才能摆脱私生子的身份，夺回属于自己的一切。\n\n而且，黑暗帝国的阴谋已经浮出水面，如果他们不采取行动，后果将不堪设想。\n\n莫雷导师叹了口气。他知道林恩的处境，也知道劝说没有用。这些年轻人都有自己的理由，都有必须前进的理由。\n\n“好吧。”莫雷导师道，声音中带着一丝无奈，“但是，你们要记住，一旦发现不对劲，立刻撤退。命只有一条，留得青山在不怕没柴烧。”\n\n“是！”众人齐声道，声音整齐划一。\n\n莫雷导师看向旁边的几个大箱子：“这些是给你们的装备。”\n\n众人打开箱子，只见里面整整齐齐地摆放着各种魔法道具和药剂，在阳光下闪烁着各异的光芒。\n\n“这些是高级恢复药剂，”莫雷导师指着几个蓝色的瓶子说道，“可以在关键时刻救命。无论受到多重的伤，只要还有一口气，就能救回来。”\n\n“这些是魔法卷轴，遇到强敌时可以使用，里面封印了七级以上的魔法。”莫雷导师又指着一叠卷轴说道，“这一叠是防御魔法，这一叠是攻击魔法，还有这一叠，是空间传送卷轴，可以在关键时刻脱离险境。”\n\n“这些是解毒剂，”莫雷导师继续道，“死亡沼泽中有致命的瘴气，这种解毒剂可以保证你们在瘴气中活动三天不受影响。”\n\n“还有这些，”莫雷导师打开另一个箱子，“是特制的防具。用银蚕丝和秘银打造的，可以抵御六级以下的所有攻击。”\n\n众人看着这些装备，眼中满是震惊。\n\n这些装备，每一件都价值不菲。加在一起，估计足以抵得上一个小贵族的全部身家。\n\n“导师，”林恩感动地道，“这太贵重了……”\n\n“贵重什么？”莫雷导师摆摆手，“只要你们能活着回来，比什么都强。”\n\n莫雷导师又看向布莱克：“布莱克，这次就麻烦你了。”\n\n布莱克是银火学派的长老，八级巅峰的强者，实力仅次于莫雷导师。有他随行，众人的安全会得到极大保障。\n\n“放心。”布莱克淡淡地道，“只要我还活着，就不会让他们出事。”\n\n“有你这句话，我就放心了。”莫雷导师道。\n\n接下来，莫雷导师又详细交代了许多注意事项。比如如何应对亡灵生物，如何辨别瘴气的浓度，如何在沼泽中辨别方向等等。\n\n这些都是他多年来的经验之谈，对众人来说无比珍贵。\n\n“最后，”莫雷导师道，“如果真的遇到了无法抵抗的敌人，不要硬拼，立刻撤退。记住，留得青山在，不怕没柴烧。只要活着，就有希望。”\n\n“是！”众人齐声道。\n\n莫雷导师看着眼前的年轻人，心中感慨万千。\n\n这些年轻人，都是他看着成长起来的。林恩、泰勒、卡尔、戈克、黛西……每一个都是他的骄傲。\n\n现在，他们要踏上未知的旅程，前途未卜。\n\n“去吧。”莫雷导师道，声音有些沙哑，“我在这里等着你们回来。”\n\n众人站起身，向莫雷导师鞠躬，然后离开了会议室。\n\n走出学派的大门，众人来到了银火城的街道上。清晨的街道已经热闹起来，商贩们的吆喝声此起彼伏，行人匆匆而过。\n\n银火城门口，黛西已经等在那里了。\n\n今天的黛西穿着一件白色的奥术法袍，显得格外飘逸。她的手中握着一根镶嵌着蓝色宝石的法杖，那是她身份的象征。\n\n“黛西？”林恩走过去，疑惑地道，“你在这里做什么？”\n\n“当然是跟你们一起走。”黛西道，语气理所当然。\n\n“不行！”林恩立刻说道，“死亡沼泽太危险了，你不能去！”\n\n死亡沼泽的凶险，卡尔已经详细地描述过。黛西虽然实力不错，但毕竟还年轻，战斗经验不足。让她进入那种九死一生的地方，林恩实在放心不下。\n\n“为什么我不能去？”黛西反问道，“我是奥术法师，可以远程攻击。而且，我的实力也不弱……”\n\n“正因为危险，才不能让你去。”林恩道，“如果发生了什么意外……”\n\n“没有什么意外！”黛西打断他，“我已经决定了，无论如何都要跟你一起去。”\n\n林恩看着黛西坚定的眼神，知道自己无法改变她的决定。\n\n“你这个傻姑娘……”林恩无奈地道。\n\n“我不傻。”黛西道，“我只是不想跟你分开。”\n\n林恩心中一暖，不再说什么。\n\n是的，他明白黛西的心意。这个倔强的姑娘，早就已经认定了要跟随他。即使前路再危险，她也愿意陪在他身边。\n\n“好吧。”林恩道，“但是，你必须答应我一件事。”\n\n“什么事？”\n\n“保护好自己。”林恩认真地道，“如果遇到危险，第一时间撤退。不要顾及我，你的安全最重要。”\n\n黛西的眼眶微微泛红：“傻瓜……你最该担心的应该是你自己才对……”\n\n两人相视一笑，一切尽在不言中。\n\n与此同时，另一边的泰勒也在和卡尔交谈。\n\n“堂兄，”泰勒道，“这次去死亡沼泽，你有多大把握？”\n\n“三成。”卡尔实话实说，“如果能够找到有价值的情报，提升到五成。”\n\n“五成……”泰勒喃喃道。这个成功率，确实很低。\n\n“但值得一试。”卡尔道，“如果能够活着出来，我们的实力将会突飞勐进。”\n\n“然后呢？”泰勒道，“就算我们变强了，能对抗整个夜语家族吗？”\n\n“夜语家族虽然强大，但也不是无敌的。”卡尔道，“别忘了，还有银月公国的皇室在压制他们。只要我们小心行事，未必没有机会。”\n\n泰勒沉默了良久，最终点了点头。\n\n“我明白了，堂兄。”泰勒道，“我会忍辱负重，直到有朝一日，能够亲手毁灭夜语家族。”\n\n“这才对。”卡尔道，“记住今日的仇恨，但不要被仇恨蒙蔽了双眼。我们的目标是星辰大海，而不是眼前的苟且。”\n\n戈克则在检查着他的装备。作为团队中的锻造师，他的武器是一把特制的锻造锤，比普通的武器要重上好几倍。\n\n“这可是我的心血啊……”戈克抚摸着锻造锤，自言自语道。\n\n这把锻造锤是他亲手打造的，锤头是用特殊的合金制成，能够对亡灵生物造成额外的伤害。这些天来，他又对锻造锤进行了一些改进，让它变得更加顺手。\n\n“有我在，你们的武器装备就不用担心了。”戈克对众人说道，“只要不是当场死亡，我都能帮你们修复！”\n\n“那就靠你了。”林恩道。\n\n而布莱克则站在一旁，沉默不语。作为八级强者，他这次的职责是保护众人的安全。\n\n“布莱克导师，”林恩走过去，“这次麻烦您了。”\n\n“无妨。”布莱克淡淡地道，“莫雷导师有令，我自然会全力保护你们。”\n\n“多谢。”\n\n“不必。”\n\n虽然布莱克的态度很冷淡，但林恩知道，这是一个外冷内热的人。否则，他也不会同意跟着他们一起去冒险。\n\n就在这时，一个身影匆匆跑来。\n\n“林恩！”\n\n众人回头看去，原来是黛西。\n\n“怎么又回来了？”林恩问道，“是不是落下什么东西了？”\n\n黛西摇摇头，犹豫了一下，然后从口袋里掏出一个吊坠。\n\n“这个给你。”黛西道，“这是我母亲留给我的护身符，据说能够辟邪驱魔。你把它戴上吧。”\n\n林恩看着那个吊坠，那是一个小小的银色月亮吊坠，看起来很普通，但能感觉到其中蕴含着一丝淡淡的魔力。\n\n“这太珍贵了……”林恩道，“我不能收。”\n\n“让你收下你就收下！”黛西强硬地道，“难道你想让我担心吗？”\n\n林恩无奈，只能接过吊坠，戴在脖子上。\n\n“谢谢。”\n\n“笨蛋……”黛西道，眼眶微微泛红，“一定要活着回来……”\n\n“我保证。”林恩认真地道。\n\n两人就这样对视着，仿佛要将对方的样子深深印在脑海中。\n\n周围的众人识趣地转过头去，给他们留出独处的时间。\n\n过了一会儿，林恩才恋恋不舍地松开黛西的手。\n\n“走吧。”林恩道，“时间不早了。”\n\n“嗯。”黛西点点头，用手背擦了一下眼角的泪水。\n\n一行人离开了银火城，踏上了前往死亡沼泽的道路。\n\n刚走出城门，黛西就忍不住回头望去。\n\n“怎么了？”林恩问道。\n\n“没什么……”黛西道，“只是有点感慨。这一去，还不知道能不能回来。”\n\n“别担心。”林恩握住黛西的手，“我一定会活着带你回来的。”\n\n“嗯……”黛西点点头，心中稍稍安定。\n\n赶了整整一天的路，傍晚时分，众人终于抵达了死亡沼泽的边缘。\n\n“好诡异的地方……”戈克看着眼前的景象，忍不住打了个寒颤。\n\n只见前方是一片一望无际的黑色沼泽，空气中弥漫着腐臭的气息。偶尔有黑色的雾气飘过，遮挡视线。而在沼泽的上方，则是永远看不到太阳的阴郁天空。\n\n整个景象看起来就像一幅来自地狱的画卷，让人不寒而栗。\n\n“大家小心。”卡尔提醒道，“这里的瘴气有毒，不要吸入太多。”\n\n众人纷纷戴上解毒剂，继续前进。\n\n刚进入沼泽不久，就遇到了第一批敌人——骷髅士兵。\n\n这些骷髅是最低级的亡灵生物，实力大约相当于一级血脉战士。它们行动缓慢，攻击力也不强，但对入侵者有着无尽的仇恨。\n\n“这些家伙就交给我吧。”戈克兴奋地道，挥舞着锻造锤冲了上去。\n\n“小心！”林恩提醒道。\n\n话音未落，戈克已经被骷髅们包围了。\n\n“哈哈哈！来得好！”戈克大笑一声，锻造锤带着凌厉的风声砸向骷髅。\n\n“咔嚓！”\n\n只是一击，骷髅们就碎了一地。\n\n“这么弱？”戈克有些失望。\n\n“别大意。”卡尔道，“这只是最低级的亡灵生物。越往里走，越强大。而且，死亡沼泽中最可怕的不是这些骷髅，而是那些看不见的东西。”\n\n“看不见的东西？”黛西好奇地道。\n\n“对。”卡尔道，“比如瘴气，比如陷阱，比如……幽灵。”\n\n“幽灵？”戈克打了个寒颤，“那种东西真的存在吗？”\n\n“存在。”卡尔道，“死亡沼泽中有大量的幽灵，它们能够直接攻击灵魂，防不胜防。”\n\n众人继续深入。\n\n一路上，他们遇到了各种亡灵生物。有骷髅、僵尸、幽灵、巫妖等等，等级从一级到六级不等。\n\n六级以下的亡灵，对众人造不成威胁。但到了后面，出现了六级甚至七级的亡灵生物，就开始有些吃力了。\n\n七级亡灵生物已经具备了相当的智慧，不再像低阶亡灵那样只知道蛮干。它们会使用战术，会设置陷阱，甚至会互相配合。\n\n“这样下去不是办法。”林恩道，“我们的体力消耗太大了。”\n\n“先找个地方休息一下吧。”泰勒提议道。\n\n“好。”\n\n众人找到一块相对安全的高地，开始休息。\n\n夜幕降临，死亡沼泽变得更加阴森。各种奇怪的声音从四面八方传来，让人毛骨悚然。\n\n“林恩，”黛西递给林恩一个水袋，“喝点水吧。”\n\n“谢谢。”林恩接过水袋，看着黛西，“你累吗？”\n\n“还好。”黛西道，“只是有些担心……”\n\n“担心什么？”\n\n“担心前面的路……”黛西道，“我已经能感觉到，越往里走，危险的气息越重。”\n\n“别怕。”林恩握住黛西的手，“有我在，不会有事的。”\n\n黛西脸微微红，但没有抽回手。\n\n两人就这样手牵手坐着，享受着难得的宁静时光。\n\n“林恩，”黛西突然道，“如果这次我们能够活着回去，你有什么打算？”\n\n“变强。”林恩道，“然后找夜语家族算账。”\n\n“然后呢？”\n\n“然后……”林恩看着黛西，心中涌起一股柔情，“也许找个地方安定下来……”\n\n黛西的眼睛亮了：“你是认真的？”\n\n“当然是认真的。”林恩道，“难道你不想过平静的生活吗？”\n\n“我想。”黛西道，“但我更想陪在你身边。”\n\n林恩看着黛西，心中涌起一股冲动，想要吻她。但最终，还是忍住了。现在还不是时候，他还有很多事情要去做。\n\n“黛西，等我。”林恩轻声道，“等我变得足够强大，能够保护你的时候……”\n\n“我等你。”黛西道。\n\n两人相视一笑，一切尽在不言中。\n\n就在这时，卡尔的声音传来。\n\n“大家准备好了吗？我们继续前进。”\n\n两人站起身，跟上队伍。\n\n接下来的路程更加艰险。\n\n亡灵生物越来越强大，众人开始出现伤亡。还好有布莱克这个八级强者在前面开路，才保证了大家的安全。\n\n三天后，众人终于抵达了死亡沼泽的中心区域。\n\n“好强大的气息……”林恩喃喃道。\n\n前方不远处，有一道巨大的黑色光柱，直冲云霄。那道光柱散发着令人心悸的死亡气息，即使是相隔甚远，也能感觉到其中的恐怖能量。\n\n“那就是冥界入口吗？”泰勒问道。\n\n“对。”卡尔道，“根据情报，那里就是黑暗帝国搞鬼的地方。”\n\n众人对视一眼，都看到了彼此眼中的震撼和决心。\n\n“我们走。”林恩道，“不管前面有什么，我们都要闯一闯。”\n\n“对！”戈克挥舞着锻造锤，“让我们看看黑暗帝国在搞什么鬼！”\n\n一行人朝着光柱的方向走去。\n\n而他们不知道的是，在光柱的深处，有一双眼睛正在注视着他们。\n\n“林恩·夜语……你终于来了……”\n\n那是一个苍老而沙哑的声音，仿佛来自九幽深处，充满了无尽的寒意和期待。\n\n（本章完）"},
{"n":66,"t":"第66章：告别","c":"银火城，东门。\n\n黎明的第一缕阳光尚未完全穿透地平线，天空呈现出一种深邃的灰蓝色。城门前的气氛却格外凝重，仿佛连空气都凝固了一般。\n\n林恩站在城门内，身后是泰勒、卡尔、戈克和黛西四人。布莱克则如同一把出鞘的利剑，安静地伫立在众人身后八步之遥。作为银火学派最顶尖的强者，这次探险的守护者，他将以自己的生命为代价，保护这些年轻人的安全。\n\n城门外的官道一直延伸到视野的尽头，那是一条通往未知命运的道路。\n\n“真的不能再考虑一下了吗？”\n\n莫雷导师的声音在众人身后响起。他缓步走来，脸上写满了担忧与不舍。这位银火学派的核心导师，此刻看起来比平日苍老了许多。\n\n“导师。”林恩转过身来，恭敬地道，“我们已经决定了。”\n\n莫雷导师沉默了片刻，目光逐一扫过在场每一个年轻人的脸庞。泰勒眼中的坚毅与仇恨，卡尔眼中的睿智与冷静，戈克眼中的兴奋与跃跃欲试，黛西眼中的柔情与担忧，还有林恩眼中那复杂的情感——感激、不舍、以及一种破釜沉舟的决心。\n\n“你们啊……”莫雷导师叹了口气，“你们知不知道，这一去，可能就再也回不来了。”\n\n“导师，我们知道。”林恩平静地道，“但是，我们没有选择。”\n\n是的，没有选择。\n\n夜语家族的追杀从未停止，黑暗帝国的阴谋蠢蠢欲动，而他们这些年轻人，如果不能抓住每一个变强的机会，就只能任人宰割。\n\n死亡沼泽虽然凶险，但那里也存在着让他们的实力突飞猛进的机遇。\n\n这是危机，也是机遇。\n\n莫雷导师自然明白这个道理，所以他并没有再劝说什么。他只是点了点头，然后缓步走到众人面前。\n\n“也罢。”莫雷导师道，“既然你们心意已决，我也不再说什么阻挠的话。但是，你们要记住，无论发生什么，银火学派永远是你们的家。”\n\n“导师……”林恩心中一暖。\n\n“特别是你，林恩。”莫雷导师看着林恩，眼中满是复杂的神色，“你的父亲……哎，算了不提了。但是你要记住，你身上流淌的不仅仅是夜语家族的血，更是银火学派的骄傲。”\n\n“弟子明白。”林恩郑重地道。\n\n莫雷导师又看向其他人：“你们也是。无论你们来自哪里，无论你们曾经经历过什么，现在，你们都是银火学派的一员。我以你们为荣。”\n\n“导师！”戈克的眼眶有些红了。这位一向大大咧咧的锻造师，此刻也不禁有些哽咽。\n\n“好啦，别做小女儿态了。”莫雷导师笑着拍了拍戈克的肩膀，“去吧，去证明自己。让他们看看，我们银火学派培养出来的弟子，到底有多强！”\n\n“是！”众人齐声道，声音在清晨的寂静中回荡。\n\n该说的话都已经说了，该交代的事项也都在昨天交代完毕。现在，是时候告别了。\n\n莫雷导师后退一步，让开了道路。\n\n“你们走吧。”莫雷导师道，“我就不送你们出城了。我怕……我怕自己会忍不住把你们留下来。”\n\n众人都是一笑，但笑声中带着几分苦涩。\n\n“导师，您多保重。”林恩道。\n\n“你也是。”莫雷导师道，“记住，安全第一。命只有一条，留得青山在不怕没柴烧。”\n\n“弟子记下了。”\n\n林恩最后看了莫雷导师一眼，然后深吸一口气，转过身去。\n\n就在他准备迈步的时候，一个清脆的声音突然响起。\n\n“等等！”\n\n众人回头，只见黛西向前走出一步。她的俏脸微微泛红，但眼神却异常坚定。\n\n“黛西？”林恩疑惑地道，“怎么了？”\n\n黛西没有回答，而是缓步走到林恩面前。她抬起头，凝视着林恩的眼睛，那双深邃的黑色眼眸中倒映着黎明的光芒。\n\n“林恩，我有话对你说。”黛西轻声道。\n\n林恩看着黛西，心中突然涌起一种奇怪的感觉。他感觉黛西接下来要说的事情，似乎很重要。\n\n“什么话？”林恩问道。\n\n黛西没有立刻回答。她伸出手，轻轻握住林恩的手。\n\n林恩身体一僵，但并没有抽回手。\n\n“林恩，还记得我们第一次见面的时候吗？”黛西柔声道。\n\n“记得。”林恩道，“那是在银火学派的新生试炼上，你作为高年级学姐，负责主持试炼。”\n\n“对。”黛西道，“那时候的你，还只是一个被所有人嘲笑的废物血脉。所有的人都在等着看你的笑话，认为你连第一关都过不了。”\n\n林恩沉默了。那段记忆，是他永远的痛。虽然现在已经过去将近一年，但每次回想起来，仍然感到隐隐作痛。\n\n“但是，你却用实际行动证明了你自己。”黛西继续道，“你不仅通过了试炼，还以第一名的成绩进入了银火学派。从那一刻起，我就知道，你不是一个普通人。”\n\n“黛西……”\n\n“所以，当你说要离开银火城的时候，我并没有感到意外。”黛西道，“因为你是林恩·夜语，你是注定要站在世界巅峰的男人。你的舞台，不应该只是一个小小的银火公国。”\n\n林恩看着黛西，心中涌起一股复杂的情感。这个女孩，从一开始就对他另眼相看。即使知道他是一个被家族驱逐的私生子，即使知道他的血脉有缺陷，她仍然毫不犹豫地选择站在他身边。\n\n“黛西，你到底想说什么？”林恩柔声道。\n\n黛西深吸一口气，仿佛下定了某种决心。\n\n“林恩，我要你答应我一件事。”黛西道。\n\n“你说。”\n\n“不管发生什么，你都要活着回来。”黛西的眼中泛起了泪光，“我知道，我无法阻止你前进的脚步。我也知道，男儿志在四方，不应该被儿女情长所牵绊。但是，我还是要说……”\n\n她的声音哽咽了。\n\n“我爱你，林恩。”\n\n这句话，如同一道惊雷，在林恩脑海中炸响。\n\n四周一片寂静，所有人的目光都集中在这对年轻人身上。\n\n泰勒和戈克对视一眼，都看到了彼此眼中的惊讶。他们虽然知道黛西对林恩有好感，但没想到她会在这种时候，当众表白。\n\n卡尔的脸上露出了一丝微笑。作为泰勒的堂兄，他比任何人都清楚仇恨的力量。但同时他也明白，有时候，爱一个人的力量，丝毫不在仇恨之下。\n\n莫雷导师则是叹了口气。年轻人的感情，总是这么的热烈而直接。\n\n布莱克仍然是那副冷漠的表情，但他的眼神中闪过一丝复杂的光芒。似乎是想起了什么遥远的记忆。\n\n林恩愣住了。\n\n他想过黛西可能会说一些告别的话，但没想到会是这样的内容。\n\n是的，他一直都知道黛西的心意。在平时的相处中，黛西对他的关心和照顾，他都看在眼里，记在心里。\n\n但是，他从来没有正面回应过这份感情。\n\n因为，他觉得自己配不上她。\n\n他是夜语家族的私生子，血脉有缺陷，前途未卜。而黛西是奥术法师公会会长的女儿，身份尊贵，天赋异禀。\n\n他们之间，隔着太多的东西。\n\n所以，他选择了逃避，选择了假装不知道。\n\n但是现在，黛西当众说出了这句话，将他所有的伪装都撕碎。\n\n“黛西，我……”林恩张了张嘴，却不知道该说什么。\n\n“你不用急着回答我。”黛西道，“我不需要你现在就给我答案。我只是想让你知道，无论你变成什么样，无论你身在何处，我都会在这里等你。”\n\n“等到你回来的那一天。”\n\n“等到你能够坦然面对我的时候。”\n\n“林恩，我爱你。”\n\n“这不是要求，而是……请求。”\n\n“请你好好的活着，好好的回来。”\n\n黛西的眼泪终于夺眶而出，但她仍然坚强地微笑着。\n\n林恩看着眼前泪流满面的女孩，心中最柔软的地方被深深触动了。\n\n他伸出手，轻轻擦去黛西脸上的泪水。\n\n“傻瓜……”林恩的声音有些沙哑，“你应该找一个更好的人……”\n\n“没有人比你更好。”黛西道，“在我的心里，你是最好的。”\n\n“但是我……”\n\n“没有但是。”黛西打断他，“林恩，我知道你在担心什么。你担心自己的身份，你担心自己的血脉，你担心自己给不了我幸福。但是，这些我都不在乎。”\n\n她握住林恩的手，放在自己的胸口。\n\n“我在乎的，只有你这个人。”\n\n“只要你活着，只要你好好地回来比什么都重要。”\n\n林恩感觉到掌心传来的温度，还有那强有力的心跳。\n\n他沉默了。\n\n周围的一切仿佛都消失了，只剩下他和黛西。\n\n终于，他开口了。\n\n“黛西，我……”\n\n“如果你不愿意接受我也没关系。”黛西抢着道，“我不需要你负责，我只需要你记住，有一个女孩在这里等你……”\n\n“我愿意。”\n\n林恩的话，让黛西瞬间僵住了。\n\n“你……你说什么？”\n\n“我说，我愿意。”林恩重复道，声音坚定而温柔，“黛西，其实我早就喜欢你了。只是我一直觉得自己配不上你，所以不敢面对这份感情。”\n\n“现在，当着所有人的面，我要告诉你。”\n\n“我，林恩·夜语，喜欢你，黛西·银光。”\n\n“我会活着回来。”\n\n“等我回来的时候，我会给你一个交代。”\n\n“等我变得足够强大，能够保护你的时候，我会正式向你求婚。”\n\n“所以，在此之前，请你等我。”\n\n黛西泪流满面，但这一次，是喜悦的泪水。\n\n“你……你说的都是真的？”黛西哽咽着道。\n\n“绝无半句虚言。”林恩道，“我以我的血脉起誓。”\n\n“不！我不要你以血脉起誓！”黛西道，“我只要你活着回来！”\n\n“会的。”林恩道，“我一定会活着回来。”\n\n两人相拥在一起。\n\n周围的众人都是露出了欣慰的笑容。\n\n泰勒和戈克吹起了口哨，卡尔笑着摇头，莫雷导师则是老怀大慰。\n\n只有布莱克，仍然是那副冷漠的表情，但他的嘴角，似乎微微上扬了一丝。\n\n过了良久，两人才分开。\n\n“林恩。”黛西柔声道，“你要记住你说过的话。”\n\n“我会的。”林恩道，“等我。”\n\n“嗯，我等你。”\n\n告别了黛西，林恩又转向莫雷导师。\n\n“导师，弟子这就走了。”林恩恭敬地道，“您多保重。”\n\n“好。”莫雷导师道，“去吧。记住，无论发生什么，银火学派永远是你的家。”\n\n“是。”\n\n林恩最后看了众人一眼，然后转过身去，迈步走向城门。\n\n泰勒、卡尔、戈克、黛西、布莱克依次跟上。\n\n走出城门的那一刻，林恩再次回头。\n\n莫雷导师仍然站在原地，朝他们挥手。\n\n林恩举起手，用力地挥了别。\n\n然后，他深吸一口气，转过头去。\n\n前方，是一望无际的荒野，是未知的危险，是通向强大的道路。\n\n但是，他的心里却异常的平静。\n\n因为，他不再是孤身一人。\n\n因为，他有了要守护的人。\n\n因为，他有了必须变强的理由。\n\n“黛西，等我。”\n\n“我一定会变得足够强大。”\n\n“然后，风风光光地娶你过门。”\n\n林恩在心中暗暗发誓。\n\n※　※　※\n\n离开了银火城，众人一路向东。\n\n银火公国的边境并不远，以他们的脚程，大约需要三天的路程。\n\n这三天，林恩想了很多。\n\n关于夜语家族，关于黑暗帝国，关于死神传承，还有关于黛西。\n\n“林恩，在想什么？”\n\n泰勒走到林恩身边，递给他一个水袋。\n\n“谢谢。”林恩接过水袋，喝了一口，“没什么，只是在想一些事情。”\n\n“关于黛西？”泰勒笑着道。\n\n“……”林恩没有否认。\n\n“可以啊，林恩。”泰勒道，“平时看你闷不作声的，没想到一出手就搞定了咱们学派的第一美女。”\n\n“别这么说。”林恩道，“我对黛西是真心的。”\n\n“我知道。”泰勒的笑容收敛了一些，“林恩，你知道吗？其实我很羡慕你。”\n\n“羡慕我？”\n\n“对。”泰勒道，“羡慕你有一个愿意为你付出一切的人。而我……”\n\n他的眼神变得暗淡下来。\n\n泰勒的家族被夜语家族灭门，只剩下他一个人。这份仇恨，他从来没有忘记，也永远不可能忘记。\n\n“泰勒。”林恩拍了拍泰勒的肩膀，“放心，我们一定会变的更强。然后，亲手毁灭夜语家族。”\n\n“对！”泰勒握紧拳头，眼中燃烧着仇恨的火焰，“不报此仇，誓不为人！”\n\n“还有我！”戈克凑过来，“那些欺负我们的人，都要付出代价！”\n\n“你？”泰勒看了戈克一眼，“你能保护好自己就不错了。”\n\n“你这是什么话！”戈克顿时不乐意了，“别忘了，上次是谁在关键时刻救了你！”\n\n“好好好，感激你行了吧。”泰勒笑着道。\n\n“这还差不多。”\n\n看着两人斗嘴，林恩和卡尔都是一笑。\n\n这就是他们的团队，虽然来自不同的地方，虽然各有各的伤痛，但是他们都相信彼此。\n\n这就是羁绊。\n\n※　※　※\n\n第一天晚上，众人找了一处废弃的神殿作为露营地点。\n\n这座神殿看起来已经废弃了很多年，墙壁上布满了岁月的痕迹，神像也已经面目全非。但是，至少可以遮风挡雨，比露宿荒野要好得多。\n\n“今晚就在这里休息吧。”卡尔道，“明天再赶一天的路，就能到达死亡沼泽的外围了。”\n\n众人点头，开始收拾起来。\n\n林恩独自走到神殿的角落，坐了下来。\n\n他闭上眼睛，开始冥想。\n\n这是他每天的必修课。即使在赶路的时候，他也不会忘记修炼。\n\n因为，只有变得更强，才能实现自己的誓言。\n\n不知道过了多久，一阵脚步声打断了他的冥想。\n\n“林恩。”\n\n是黛西的声音。\n\n林恩睁开眼睛，看到黛西端着一碗热汤走了过来。\n\n“喝点东西吧。”黛西柔声道，“今天一天都没吃什么。”\n\n“谢谢。”林恩接过汤碗，却没有喝。\n\n“怎么了？”黛西问道，“有心事？”\n\n“没什么。”林恩道，“只是在想一些事情。”\n\n“关于此行？”黛西在林恩身边坐下。\n\n“对。”林恩道，“死亡沼泽的凶险，卡尔已经详细地描述过。这一去，可能真的会有生命危险。”\n\n“所以呢？”黛西看着林恩，“你害怕了？”\n\n“害怕？”林恩笑了笑，“不，我不害怕。”\n\n“那你在担心什么？”\n\n“我在担心……”林恩看着黛西，“如果我出了什么事情，你怎么办？”\n\n黛西沉默了。\n\n过了片刻，她才开口。\n\n“林恩，你知道吗？当我决定跟你一起走的时候，我就已经做好了所有的心理准备。”\n\n“包括最坏的打算？”\n\n“对。”黛西道，“包括最坏的打算。”\n\n她握住林恩的手。\n\n“林恩，我不是一个温室里的花朵。我是一名奥术法师，我有自己的战斗能力。我不需要你时时刻刘的保护我，我只需要你……”\n\n她顿了顿。\n\n“我只需要你活着回来。”\n\n“这对我来说，比什么都重要。”\n\n林恩看着黛西，心中涌起一股暖流。\n\n“黛西，你放心。”林恩道，“我一定会活着回来。”\n\n“因为我还没有娶你过门呢。”\n\n黛西的脸顿时红了。\n\n“谁……谁说要嫁给你了！”黛西娇声道。\n\n“你刚才还说你爱我呢。”林恩笑着道，“怎么，现在反悔了？”\n\n“我……”黛西顿时语塞。\n\n看着黛西娇羞的样子，林恩不禁笑了。\n\n这是他这几天来，第一次发自内心的笑。\n\n“黛西，谢谢你。”林恩柔声道，“谢谢你愿意等我。”\n\n“别说了。”黛西道，“我们之间，不需要说这些。”\n\n“嗯。”\n\n两人就这样坐着，享受着难得的宁静时光。\n\n过了一会儿，黛西突然开口。\n\n“林恩，等这次探险结束，你有什么打算？”\n\n“变强。”林恩道，“然后找夜语家族算账。”\n\n“然后呢？”\n\n“然后……”林恩看着黛西，心中涌起一股柔情，“也许找个地方安定下来……”\n\n黛西的眼睛亮了：“你是认真的？”\n\n“当然是认真的。”林恩道，“难道你不想过平静的生活吗？”\n\n“我想。”黛西道，“但我更想陪在你身边。”\n\n“无论是平静的生活，还是冒险的生活，只要有你在身边，就足够了。”\n\n林恩看着黛西，心中充满了感动。\n\n这个女孩，为他付出了太多太多。\n\n而他能做的，就是变强，然后给她一个幸福的未来。\n\n“黛西，等我。”林恩轻声道，“等我变得足够强大，能够保护你的时候……”\n\n“我等你。”黛西道。\n\n两人相视一笑，一切尽在不言中。\n\n就在这时，泰勒的声音从身后传来。\n\n“林恩，黛西，你们在聊什么？吃饭了！”\n\n“来了！”林恩应道。\n\n两人站起身，朝营地走去。\n\n吃过晚饭后，众人围坐在火堆旁聊天。\n\n“林恩，”戈克突然道，“你说死亡沼泽里面，会是什么样子？”\n\n“我怎么知道？”林恩道，“我又没去过。”\n\n“我听说，”卡尔接口道，“死亡沼泽是上古战场的遗址。很久以前，人类与黑暗种族在那里爆发了一场大战，死了很多人……”\n\n“所以，那里才会有那么多亡灵生物？”泰勒问道。\n\n“对。”卡尔道，“那些战死的士兵，因为怨气不散，就变成了亡灵。”\n\n“原来如此。”戈克道，“那冥界入口又是怎么回事？”\n\n“这我就不知道了。”卡尔道，“也许，只有到了那里才能知道。”\n\n众人都是沉默。\n\n他们对即将面对的未知，既期待又紧张。\n\n“大家不用担心。”林恩道，“不管前面有什么，我们一起面对。”\n\n“对！”戈克道，“我们是最强的团队！”\n\n“对！”泰勒也道，“没有什么能够阻挡我们！”\n\n众人都是一笑，心中的阴霾散去了一些。\n\n夜深了，众人各自回到休息的地方。\n\n黛西走到林恩身边。\n\n“今晚……我可以跟你一起守夜吗？”黛西小声道。\n\n“守夜？”林恩愣了一下，“为什么？”\n\n“我不想跟你分开。”黛西道，“哪怕只是一晚上。”\n\n林恩看着黛西，最终点了点头。\n\n“好。”\n\n两人坐在火堆旁，看着跳动的火焰。\n\n“林恩。”黛西突然道。\n\n“什么？”\n\n“如果，我是说如果。”黛西的声音有些颤抖，“如果你真的出了什么事情……”\n\n“不会的。”林恩打断她。\n\n“我知道，我只是想……”\n\n“黛西。”林恩握住黛西的手，“我向你保证，我一定会活着回来。”\n\n“因为，我还有未完成的使命。”\n\n“因为，我还有未实现的心愿。”\n\n“更因为，我还有你。”\n\n黛西的眼泪再次流了下来。\n\n但是这一次，是幸福的泪水。\n\n“林恩，我爱你。”\n\n“我知道。”林恩道，“我也爱你。”\n\n两人相拥在一起。\n\n星光灿烂，火光摇曳。\n\n这一夜，两人就这样坐着，直到天明。\n\n※　※　※\n\n第二天清晨，众人继续前进。\n\n越往东走，周围的景象就越荒凉。\n\n原本郁郁葱葱的森林，逐渐变得稀疏起来。天空也变得越来越阴郁，仿佛永远看不到太阳。\n\n空气中，开始出现淡淡的腐臭气味。\n\n“大家小心。”卡尔提醒道，“我们已经接近死亡沼泽的范围了。”\n\n众人点头，纷纷提高警惕。\n\n林恩握着剑柄，警惕地看着四周。\n\n他能感觉到，前方不远处，有大量的死亡气息。\n\n那种气息，让他体内的死神传承产生了一种奇特的共鸣。\n\n“看来，死亡沼泽比我想象的还要神秘。”林恩暗暗道。\n\n中午时分，众人终于抵达了死亡沼泽的外围。\n\n“好浓重的死亡气息……”黛西皱着眉头道。\n\n确实，刚靠近沼泽，就能感觉到一股阴冷的气息扑面而来。\n\n而且，越往里走，这种感觉就越强烈。\n\n而且，最令人惊讶的是，黛西发现前方的空气中竟然开始出现淡淡的白雾，那白雾看起来非常诡异，给人一种极度危险的感觉。\n\n“大家小心。”卡尔再次提醒道，“从现在开始，我们要提高警惕了。”\n\n众人点头，纷纷握紧武器。\n\n前方，是未知的死亡沼泽。\n\n等待他们的，将是前所未有的挑战。\n\n但他们并不害怕。\n\n因为，他们有彼此。\n\n因为，他们心中有信念。\n\n那就是，变强！\n\n林恩最后回头看了一眼来时的方向。\n\n那里，是银火城的方向。\n\n那里，有他的导师，有他的朋友，还有他深爱的女孩。\n\n“等着我，黛西。”\n\n“我一定会活着回来。”\n\n“然后，风风光光地娶你过门。”\n\n林恩在心中暗暗发誓。\n\n然后，他深吸一口气，迈步踏入了死亡沼泽。\n\n第一阶段，结束。\n\n第二阶段，即将开始。\n\n（本章完）"},
{"n":67,"t":"第67章：死亡沼泽初现","c":"踏入死亡沼泽的那一刻，林恩感觉自己仿佛穿越了两个世界的边界。\n\n外界还是阳光明媚的白昼，而沼泽内部，却是一片永恒的黑暗。\n\n天空被厚重的乌云覆盖，看不到一丝阳光。空气中弥漫着腐臭的气息，那种味道令人作呕，仿佛是无数尸体腐烂后混合在一起的味道。\n\n脚下的土地松软潮湿，每一步都会陷入黑色的淤泥中。若不是众人都有武艺在身，恐怕很快就会沉入沼泽底部。\n\n“好恶心……”黛西皱着眉头道。\n\n她释放了一个防护结界，将自己和周围的人笼罩在内，隔绝了那股腐臭的气息。\n\n“多谢。”林恩道。\n\n“别客气。”黛西道，“小心点，这里的环境太诡异了。”\n\n确实诡异。\n\n众人警惕地看着四周，不敢有丝毫大意。\n\n前方的沼泽中，隐约可见各种亡灵生物的身影。\n\n骷髅、僵尸、幽灵……各种等级的亡灵生物在沼泽中徘徊，数量之多，令人心悸。\n\n“大家跟紧我。”卡尔低声道，“千万不要走散。”\n\n众人点头，紧密地聚集在一起。\n\n布莱克走在最前面，手中握着长剑，警惕地看着前方。八级强者的气息散发出来，让周围的低级亡灵不敢靠近。\n\n这就是实力的威慑。\n\n在这个弱肉强食的世界，实力才是生存的根本。\n\n众人小心翼翼地前进着，尽量避开那些强大的亡灵生物。\n\n但是，沼泽中的亡灵生物实在太多了，想要完全避开，几乎不可能。\n\n“小心！”\n\n戈克突然大喊一声。\n\n只见前方的沼泽中，突然伸出数十只骨爪，朝着众人抓来。\n\n“找死！”\n\n戈克怒吼一声，挥舞着手中的锻造锤，朝着那些骨爪砸去。\n\n“咔嚓！咔嚓！”\n\n只是一瞬间，那些骨爪就被砸得粉碎。\n\n但是，这只是一个开始。\n\n更多的亡灵生物从沼泽中爬出来，将众人团团包围。\n\n“是骷髅陷阱！”卡尔大声道，“大家背靠背防守！”\n\n众人会意，迅速背靠背站成一个圆圈。\n\n布莱克在圆圈的外围，长剑挥舞，将那些试图靠近的亡灵一一斩杀。\n\n林恩则是释放出暗影之力，形成一道防护罩，保护众人不受伤害。\n\n黛西不停地释放魔法，对那些亡灵进行远程打击。\n\n泰勒和戈克则是负责清理从两侧靠近的敌人。\n\n卡尔的魔法不要钱地砸向亡灵群中，每一次攻击都能带走一大片亡灵。\n\n这就是团队配合的力量。\n\n即使面对数以千计的亡灵，众人也能有条不紊地进行防御和反击。\n\n不知道过了多久，亡灵的攻击终于停歇了。\n\n“呼……呼……”\n\n戈克喘着粗气，一屁股坐在地上。\n\n“好险……这些家伙真是没完没了……”\n\n其他人也都差不多，每个人都累得够呛。\n\n“先休息一下吧。”卡尔道，“这样下去，我们的体力会被耗尽的。”\n\n众人点头，开始休息。\n\n林恩走到一块相对干燥的高地上，俯瞰着整个沼泽。\n\n“好大……”林恩喃喃道。\n\n死亡沼泽比他想象的还要大。一眼望去，根本看不到边际。\n\n而且，越往中心方向，那股死亡气息就越浓郁。\n\n“林恩，”黛西走过来，“你在看什么？”\n\n“看那道光柱。”林恩道。\n\n黛西顺着林恩的目光看去，只见远方天际，有一道巨大的黑色光柱，直冲云霄。\n\n“那是什么？”黛西问道。\n\n“如果我猜得没错，”林恩道，“那应该就是冥界入口。”\n\n“冥界入口……”黛西喃喃道，眼中闪过一丝担忧。\n\n她能感觉到，那道光柱中蕴含着极其恐怖的能量。\n\n那种能量，让她感到心悸。\n\n“林恩，你真的决定要去那里？”黛西问道。\n\n“对。”林恩道，“我必须去。”\n\n“为什么？”\n\n“因为……”林恩看着黛西，“我身上的死神传承告诉我，那里有关于我命运的答案。”\n\n黛西沉默了。\n\n她知道，她无法阻止林恩。\n\n“那我跟你一起去。”黛西道。\n\n“不。”林恩道，“你留在这里。”\n\n“为什么？！”\n\n“因为太危险了。”林恩道，“如果我出了什么事情，你还可以回去报信。”\n\n“不！”黛西激动地道，“我不要跟你分开！”\n\n林恩看着黛西，心中一暖。\n\n“黛西，”林恩轻声道，“听我说。”\n\n“说什么？”\n\n“我知道你担心我。”林恩道，“但是，这可能是我唯一的机会。如果我错过了，可能永远也无法变强。”\n\n“那我呢？”黛西的眼泪流了下来，“如果你出了什么事情，我怎么办？”\n\n林恩伸出手，轻轻擦去黛西脸上的泪水。\n\n“相信我。”林恩道，“我一定会活着回来。”\n\n黛西看着林恩坚定的眼神，最终点了点头。\n\n“好吧。”黛西道，“但是，你要答应我，一定要活着回来。”\n\n“我答应你。”林恩道。\n\n两人拥抱在一起。\n\n不远处，泰勒等人看着这一幕，都没有说话。\n\n“林恩这个家伙……”戈克嘟囔道，“发展到哪一步了？”\n\n“你少说两句吧。”卡尔白了他一眼。\n\n两人都是一笑。\n\n休息完毕后，众人继续前进。\n\n越靠近光柱，周围的景象就越诡异。\n\n原本黑色的沼泽，开始出现淡淡的白光。那种光芒，阴冷而诡异，让人毛骨悚然。\n\n而且，空气中的死亡气息也越来越浓重。\n\n“好难受……”戈克皱着眉头道。\n\n不仅是戈克，其他人的脸色也不太好看。\n\n只有林恩和布莱克，还能保持正常。\n\n“林恩，”布莱克低声道，“你有没有感觉到什么？”\n\n“对。”林恩道，“那种召唤感越来越强烈了。”\n\n“我也是。”布莱克道，“看来，冥界入口真的在召唤我们。”\n\n两人对视一眼，都看到了彼此眼中的震撼。\n\n※　※　※\n\n随着深入死亡沼泽，周围的景象变得越来越诡异。\n\n原本只是黑色的沼泽，开始出现各种奇怪的现象。\n\n有时，地面上会突然冒出绿色的火焰，燃烧一会儿后自行熄灭。\n\n有时，天空中会飘过透明的幽灵，发出凄厉的惨叫声。\n\n有时，脚下的沼泽会变成血红色，仿佛有鲜血在下面流动。\n\n“这里到底是怎么回事？”戈克忍不住道，“为什么会这么诡异？”\n\n“这都是死亡能量汇聚的结果。”卡尔解释道，“死亡沼泽是上古战场的遗址，当年死在这里的士兵，数量多达数十万。”\n\n“数十万？！”戈克惊呼道。\n\n“对。”卡尔道，“那些士兵死后，灵魂无法安息，就变成了亡灵。”\n\n“而且，随着时间的推移，这些亡灵的怨气越来越重，就形成了现在的死亡沼泽。”\n\n“这里的死亡能量，比世界上任何地方都要浓郁。”\n\n“也正因为如此，这里才会成为冥界入口的所在地。”\n\n“冥界？”戈克好奇地道，“那是什么地方？”\n\n“传说中，是死者灵魂的归宿。”卡尔道，“但具体是什么样子，没有人知道。”\n\n“因为，进入冥界的人，从来没有活着回来过。”\n\n此言一出，众人都是心中一凛。\n\n从来没有人活着回来过？\n\n那他们此行……\n\n“别担心。”林恩道，“我们一定会活着回来的。”\n\n“对！”戈克握紧拳头，“我们一定可以的！”\n\n众人对视一眼，眼中都燃起了斗志。\n\n不管前面有什么在等着他们，他们都不会退缩。\n\n因为，他们是伙伴。\n\n因为，他们有彼此。\n\n※　※　※\n\n傍晚时分，众人终于抵达了死亡沼泽的中心区域。\n\n“好美……”黛西喃喃道。\n\n确实，眼前的美景，让人忘记了之前的疲惫和危险。\n\n只见前方，是一片一望无际的湖泊。\n\n但是，那不是普通的湖泊。\n\n湖水是黑色的，但表面上却漂浮着无数蓝色的光点。那些光点缓缓飘动，仿佛萤火虫一般，将整个湖面点缀得如梦如幻。\n\n而在湖面的中心，有一道巨大的黑色光柱，直冲云霄。\n\n光柱的周围，笼罩着淡淡的雾气，给人一种神秘而诡异的感觉。\n\n“好强大的能量……”林恩喃喃道。\n\n他能感觉到，那道光柱中蕴含的能量，比他之前感受过的任何能量都要强大。\n\n那种能量，让他体内的死神传承产生了强烈的共鸣。\n\n仿佛有什么东西，在召唤着他。\n\n“大家小心。”卡尔提醒道，“越美丽的东西，往往越危险。”\n\n众人点头，警惕地看着四周。\n\n就在这时，湖面上突然发生了变化。\n\n那些蓝色的光点，开始朝着众人聚集过来。\n\n“什么情况？！”戈克紧张地道。\n\n“别慌！”卡尔大声道，“这是灵魂之火，是死亡能量的具象化。只要不触碰它，就不会有事。”\n\n众人都是点头，小心翼翼地看着那些灵魂之火从身边飘过。\n\n然而就在这时异变陡生！\n\n“吼！”\n\n一声震天的咆哮声，从湖底传来。\n\n紧接着，整个湖面开始沸腾。\n\n一道巨大的身影，从湖底缓缓升起。\n\n“那是什么？！”泰勒惊呼道。\n\n众人都是变色。\n\n那道身影，的身形极其庞大，高度至少有上百米。\n\n它的身体由白骨构成，散发着森森的寒意。\n\n它的头颅是一只巨大的骷髅，眼眶中燃烧着绿色的火焰。\n\n它的身体周围，环绕着无数灵魂之火，仿佛众星捧月一般。\n\n“八级亡灵！”布莱克沉声道，“不，不对……”\n\n“这气息，比八级还要强大！”\n\n“九级！”\n\n此言一出，众人都是倒吸一口凉气。\n\n九级亡灵！\n\n那可是相当于人类九级强者的存在！\n\n在整个银火公国，都找不出几个九级强者！\n\n而现在，他们竟然遇到了一个九级亡灵！\n\n“怎么办？！”戈克的声音有些颤抖。\n\n“别慌！”林恩大声道，“大家背靠背，准备战斗！”\n\n众人会意，迅速聚集在一起。\n\n但是，面对九级亡灵，他们真的有机会吗？\n\n答案是……\n\n没有。\n\n九级亡灵的实力，根本不是他们能够对抗的。\n\n即使有布莱克这个八级强者，也无济于事。\n\n因为，九级和八级之间，是一道无法跨越的鸿沟。\n\n然而就在这危急时刻，林恩做出了一个出人意料的举动。\n\n他向前迈出一步，直面那只九级亡灵。\n\n“林恩！”黛西惊呼道，“你要做什么？！”\n\n但是，林恩仿佛没有听到一般，仍然继续向前。\n\n他的身上，开始散发出一种奇异的气息。\n\n那种气息，冰冷、黑暗、仿佛来自九幽深渊。\n\n那是……死神的气息！\n\n“吼？！”\n\n那只九级亡灵，竟然停住了。\n\n它的眼眶中，绿色的火焰不停地跳动着，仿佛在恐惧什么。\n\n“滚。”\n\n林恩的口中，吐出一个字。\n\n那个字，仿佛有魔力一般，让那只九级亡灵的身体剧烈颤抖起来。\n\n“吼！”\n\n最终，那只九级亡灵选择了退却。\n\n它咆哮了一声，然后缓缓沉入湖底。\n\n湖面恢复了平静，那些灵魂之火也重新飘散开来。\n\n众人都是愣住了。\n\n“林恩……”黛西走到林恩身边，“你刚才……”\n\n“没事。”林恩道，“只是用死神的气息威慑了一下它而已。”\n\n死神的气息，对于亡灵生物，有着天然的克制作用。\n\n那只九级亡灵虽然强大，但面对真正的死神气息，仍然感到恐惧。\n\n所以，它选择了退却。\n\n“原来如此。”卡尔恍然大悟，“死神传承，竟然还有这样的作用。”\n\n“对。”林恩道，“这也是我敢来死亡沼泽的底气之一。”\n\n众人都是松了一口气。\n\n虽然经历了惊险，但总算是有惊无险。\n\n“我们继续前进吧。”林恩道，“前面应该就是冥界入口了。”\n\n众人点头，继续朝着光柱的方向前进。\n\n※　※　※\n\n终于，在太阳即将落山的时候，众人抵达了光柱的下方。\n\n“好大……”泰勒喃喃道。\n\n确实，那道光柱直径至少有上百米，高度更是直达天际，仿佛连接了天地一般。\n\n而在光柱的周围，则是密密麻麻的亡灵生物。\n\n那些亡灵生物似乎被某种力量阻挡，无法进入光柱的范围。\n\n它们只能在光柱外围徘徊，发出阵阵低沉的咆哮。\n\n“好多……”戈克咽了口唾沫。\n\n粗略估计，这里的亡灵至少有上千只，而且大部分都是六级以上的存在。\n\n甚至，还有几只的气息达到了八级！\n\n“八级亡灵……”布莱克沉声道，“这里竟然有八级亡灵……”\n\n八级亡灵，那可是相当于人类八级强者的存在！\n\n在这死亡沼泽的中心区域，竟然出现了这种级别的亡灵生物，可想而知，这里到底有多危险。\n\n“怎么办？”泰勒问道。\n\n“只有一个办法。”林恩道，“冲过去。”\n\n“冲过去？！”众人都是变色。\n\n“对。”林恩道，“只有进入光柱，才能知道冥界入口的秘密。”\n\n“可这些亡灵……”卡尔担忧地道。\n\n“放心，我有办法。”林恩道。\n\n说完，林恩身上开始散发出一股强大的气息。\n\n那是死神传承的力量！\n\n“吼！”\n\n林恩勐地爆发出怒吼，声音竟然压过了所有的亡灵咆哮。\n\n那些亡灵竟然停顿了一下，仿佛在恐惧什么。\n\n“好机会！”林恩大声道，“快冲！”\n\n众人会意，纷纷朝光柱的方向冲去。\n\n布莱克在前面开路，林恩殿后，其他人则保护着黛西和戈克。\n\n所过之处，亡灵生物竟然不敢靠近！\n\n“快！”\n\n众人以最快的速度冲进了光柱。\n\n当他们进入光柱范围的瞬间，外面的亡灵生物发出了愤怒的咆哮，但却不敢进入光柱。\n\n“安全了……”戈克一屁股坐在地上。\n\n其他人也都松了一口气。\n\n“林恩，”黛西看向林恩，“刚才那是怎么回事？”\n\n林恩没有回答，只是抬头看着光柱的深处。\n\n在那里，他能感觉到，有某种强大的存在，在注视着他。\n\n那是一种很奇怪的感觉。\n\n就好像是……血脉相连的亲人，正在召唤他回家。\n\n“欢迎来到冥界入口……”\n\n一个苍老的声音，在众人耳边响起。\n\n众人都是变色。\n\n“什么人？！”\n\n没有人回答。\n\n但紧接着，光柱开始发生变化。\n\n一道巨大的门户，出现在众人面前。\n\n那是一道由白骨构成的门户，门户上雕刻着复杂的符文，散发着淡淡的光芒。\n\n“那就是冥界入口……”林恩喃喃道。\n\n他能感觉到，门户的后面，是另一个世界。\n\n一个属于死亡的世界。\n\n“林恩……”黛西握住林恩的手，“我们真的要进去吗？”\n\n林恩沉默了片刻，最终点了点头。\n\n“对。”林恩道，“我们一定要进去。”\n\n“因为，那里有关于我的命运。”林恩道，“也有，可能让你们变强的机遇。”\n\n众人对视一眼，都点了点头。\n\n“好。”泰勒道，“我们一起进去。”\n\n“对！”戈克道，“大不了就是一条命！”\n\n卡尔和布莱克也点头同意。\n\n“我们走！”\n\n一行人，迈步踏入了那扇白骨门户。\n\n就在他们进入门户的瞬间，光柱勐地爆发出一阵耀眼的光芒。\n\n紧接着，一切归于平静。\n\n而林恩，则是感觉到一股前所未有的力量，涌入了他的身体。\n\n那种感觉，无法用言语来形容。\n\n仿佛，他的灵魂正在被某种力量唤醒。\n\n“这就是死神的力量吗……”林恩喃喃道。\n\n他知道，从这一刻起，他的命运将彻底改变。\n\n但是，就在他准备进一步感受这股力量的时候异变陡生！\n\n“等等！”\n\n林恩勐地停下脚步，脸上露出惊骇欲绝的表情。\n\n“林恩？！”黛西被林恩的反应吓了一跳，“怎么了？！”\n\n其他也都是惊讶地看着林恩，不知道发生了什么事情。\n\n但是，林恩仿佛没有听到黛西的话一般，他的全部注意力，都集中在了前方。\n\n准确地说，是集中在了那道白骨门户的深处。\n\n在那里，有某种东西在召唤他。\n\n那种召唤，比之前任何时候都要强烈！\n\n不，不仅仅是召唤。\n\n更准确地说，那是……血脉的共鸣！\n\n“原来……原来是这样……”\n\n林恩喃喃自语，脸上露出了不可思议的表情。\n\n“林恩，你到底怎么了？！”黛西抓住林恩的手臂，“你说话啊！”\n\n林恩终于回过神来。\n\n他看着黛西，又看了看其他等人。\n\n“对不起，让大家担心了。”林恩道，“刚才，我感觉到了一些不可思议的事情。”\n\n“什么事情？”泰勒问道。\n\n林恩沉默了片刻，似乎在组织语言。\n\n“你们知道吗？”林恩缓缓地道，“我身上的死神传承，并不是完整的。”\n\n“不是完整的？”卡尔皱眉道，“这是什么意思？”\n\n“意思是，”林恩道，“死神的力量，被分散了。”\n\n“分散了？”\n\n“对。”林恩道，“刚才，在进入这道门户的瞬间，我感受到了其他死神传承者的存在。”\n\n此言一出，众人都是变色。\n\n死神传承者！\n\n那意味着，除了林恩之外，还有其他人继承了死神的力量！\n\n“这……这怎么可能？！”戈克惊呼道。\n\n“为什么不可能？”林恩道，“死神传承，并不是只有一份。在很久很久以前，死神将自己的力量分散成无数份，散落在世界的各个角落。”\n\n“而我，只是运气好，得到了其中一份而已。”\n\n“那其他死神传承者呢？”黛西问道，“他们在哪里？”\n\n林恩抬起头，看向前方的黑暗。\n\n“如果我猜得没错，”林恩道，“他们应该都在冥界。”\n\n“冥界？！”\n\n“对。”林恩道，“那个属于死亡的世界。”\n\n“在那里，死神的力量最为浓郁。”\n\n“所以，那些死神传承者，都在冥界中沉睡。”\n\n“等待着重见天日的那一刻。”\n\n众人都是沉默了。\n\n这个消息，实在是太震撼了。\n\n他们原本以为，此行最大的收获，就是能够进入冥界入口，获得死神传承的力量。\n\n但没想到，竟然还有其他的死神传承者存在！\n\n“那他们是敌是友？”泰勒问道。\n\n“不知道。”林恩摇头道，“但是，根据死神传承的记忆，那些传承者，都是被上一任死神选中的候选人。”\n\n“候选人？”\n\n“对。”林恩道，“死神的力量，并不仅仅是一份力量，更是一种职责。”\n\n“每一任死神，在临终之前，都会选择新的继承人。”\n\n“而继承人之间，只有一个人能够存活。”\n\n“其他的候选人，都会被淘汰。”\n\n“淘汰的方式……”\n\n林恩顿了顿，眼中闪过一丝寒光。\n\n“就是死亡。”\n\n此言一出，众人都是倒吸一口凉气。\n\n也就是说，那些其他的死神传承者，都是林恩的敌人！\n\n而且，他们很可能比林恩更加强大！\n\n毕竟，能够在冥界中生存下来，吸收死神力量的存在，实力绝对不容小觑。\n\n“林恩……”黛西担忧地看着林恩。\n\n“别担心。”林恩握住黛西的手，“我不会有事的。”\n\n“虽然敌人很强，但是，我也不会坐以待毙。”\n\n“死神的力量，我已经初步掌握了。”\n\n“只要给我时间，我一定能够变得比他们更强。”\n\n“对吗？”林恩在心中暗暗道。\n\n他能感觉到，那股召唤仍然在持续。\n\n而且，随着时间的推移，那股召唤越来越强烈。\n\n仿佛有什么东西，正在黑暗中注视着他。\n\n等待着他的到来。\n\n“那我们现在该怎么办？”卡尔问道。\n\n林恩深吸一口气，平复了一下心情。\n\n“继续前进。”林恩道，“既然已经来了，就没有退路了。”\n\n“不管前面有什么在等着我们，我们都要闯一闯。”\n\n“对！”戈克挥舞着锻造锤，“让我们看看，那些死神传承者到底有多厉害！”\n\n“对！”泰勒也道，“不管敌人有多强，我们都不会退缩！”\n\n看着众人坚定的眼神，林恩心中涌起一股暖流。\n\n这就是他的伙伴。\n\n无论面对什么样的敌人，都会站在他身边。\n\n“好。”林恩道，“我们走！”\n\n一行人，继续朝着冥界深处前进。\n\n但是，林恩的心中，却始终保持着警惕。\n
